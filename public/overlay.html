<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>OBS Overlay</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      background: transparent;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 1920px;
      height: 1080px;
    }

    /* STREAMER */
    .streamer-box {
  position: absolute;
  top: 30px;
  left: 80px;
  width: 220px;
  height: 420px;
      background: rgba(15,23,42,0.85);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: bold;
    }

    /* QUIZ (kleiner + mehr Rand links/rechts) */
    .quiz-box {
      position: absolute;
      top: 30px;
      left: 420px;
      right: 420px;
      height: 420px;
      background: rgba(15,23,42,0.75);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .quiz-text {
      font-size: 48px;
      font-weight: bold;
      line-height: 1.2;
    }

    /* TIMER */
    .timer {
      position: absolute;
      top: 470px;
      right: 120px;
      font-size: 40px;
      font-weight: bold;
      color: #60a5fa;
    }

    /* ANSWER / BUZZ */
    .answer-box {
      position: absolute;
      top: 460px;
      left: 420px;
      right: 420px;
      text-align: center;
      font-size: 32px;
      min-height: 60px;
    }

    /* KAMERAS (höher) */
    .players-row {
  position: absolute;
  bottom: 200px;

  /* Mehr Abstand links/rechts */
  left: 120px;
  right: 220px;

  display: grid;

  /* Kameras etwas kleiner → mehr Platz zwischen ihnen */
  grid-template-columns: repeat(4, 1fr);

  /* Mehr Abstand zwischen Kameras */
  gap: 40px;
}

    .player-slot {
      height: 320px;
      background: rgba(15,23,42,0.75);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .camera-frame {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
      font-size: 24px;
    }

    .player-name {
      text-align: center;
      padding: 14px;
      font-size: 24px;
      font-weight: bold;
      background: rgba(0,0,0,0.4);
    }

    /* PUNKTE UNTER KAMERAS */
    .score-row {
      position: absolute;
      bottom: 60px;
      left: 40px;
      right: 40px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .score-box {
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      text-align: center;
      padding: 12px;
    }

    .score-name {
      font-size: 16px;
      color: #aaa;
    }

    .score-points {
      font-size: 28px;
      font-weight: bold;
      color: #ffd54a;
    }
  </style>
</head>
<body>
  <div class="canvas">

    <div class="streamer-box">
      Streamer / Avatar
    </div>

    <div class="quiz-box">
      <div class="quiz-text" id="quizText">Warte auf Frage</div>
    </div>

    <div class="timer" id="timerText"></div>

    <div class="answer-box" id="answerBox"></div>

    <!-- Kameras -->
    <div class="players-row">
      <div class="player-slot">
        <div class="camera-frame">Slot 1</div>
        <div class="player-name" id="p1">Leer</div>
      </div>
      <div class="player-slot">
        <div class="camera-frame">Slot 2</div>
        <div class="player-name" id="p2">Leer</div>
      </div>
      <div class="player-slot">
        <div class="camera-frame">Slot 3</div>
        <div class="player-name" id="p3">Leer</div>
      </div>
      <div class="player-slot">
        <div class="camera-frame">Slot 4</div>
        <div class="player-name" id="p4">Leer</div>
      </div>
    </div>

    <!-- Punkte -->
    <div class="score-row" id="scoreRow"></div>

  </div>

  <script>
    const socket = io();

    const quizText = document.getElementById("quizText");
    const timerText = document.getElementById("timerText");
    const answerBox = document.getElementById("answerBox");
    const scoreRow = document.getElementById("scoreRow");

    const playerEls = {
      1: document.getElementById("p1"),
      2: document.getElementById("p2"),
      3: document.getElementById("p3"),
      4: document.getElementById("p4")
    };

    function clearPlayers() {
      for (let i = 1; i <= 4; i++) {
        playerEls[i].textContent = "Leer";
      }
    }

    socket.on("lobbyUpdate", (players) => {
      clearPlayers();

      players.forEach(p => {
        if (playerEls[p.slot]) {
          playerEls[p.slot].textContent = p.name;
        }
      });
    });

    socket.on("syncState", (state) => {

      // Frage
      if (state.activeQuestion) {
        quizText.textContent = state.activeQuestion;
      } else {
        quizText.textContent = "Warte auf Frage";
      }

      // Timer
      if (state.timer && state.timer.total > 0) {
        timerText.textContent = "⏱ " + state.timer.remaining + "s";
      } else {
        timerText.textContent = "";
      }

      // Antwort / Buzz
      if (state.answerVisible && state.currentAnswer) {
        answerBox.innerHTML = `
          <span style="color:#22c55e;">Richtige Antwort:</span><br>
          <strong>${state.currentAnswer}</strong>
        `;
      } else if (state.firstBuzz) {
        answerBox.innerHTML = `
          <span style="color:#ffd54a;">🔔 ${state.firstBuzz}</span>
        `;
      } else {
        answerBox.innerHTML = "";
      }

      // Punkte anzeigen
      const entries = Object.entries(state.scores || {});
      scoreRow.innerHTML = entries.map(([name, points]) => `
        <div class="score-box">
          <div class="score-name">${name}</div>
          <div class="score-points">${points}</div>
        </div>
      `).join("");
    });
  </script>
</body>
</html>
