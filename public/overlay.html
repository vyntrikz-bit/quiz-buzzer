<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>OBS Overlay</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      background: url("background.png") center center / cover no-repeat;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 1920px;
      height: 1080px;
    }

    .streamer-box {
      position: absolute;
      top: 80px;
      left: 160px;
      width: 350px;
      height: 380px;
      background: rgba(15, 23, 42, 0.78);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.35);
    }

    #avatar {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .quiz-box {
      position: absolute;
      top: 40px;
      left: 550px;
      width: 1130px;
      height: 420px;
      background: rgba(15, 23, 42, 0.72);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      box-sizing: border-box;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.35);
    }

    .quiz-text {
      font-size: 48px;
      font-weight: bold;
      line-height: 1.2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .timer {
      position: absolute;
      top: 470px;
      right: 120px;
      font-size: 40px;
      font-weight: bold;
      color: #60a5fa;
      min-width: 180px;
      text-align: right;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .answer-box {
      position: absolute;
      top: 460px;
      left: 550px;
      width: 1130px;
      text-align: center;
      font-size: 32px;
      min-height: 60px;
      line-height: 1.3;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .players-row {
      position: absolute;
      bottom: 180px;
      left: 160px;
      right: 240px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px;
    }

    .player-slot {
      height: 300px;
      background: rgba(15, 23, 42, 0.72);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.35);
    }

    .camera-frame {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.45);
      font-size: 24px;
      background: linear-gradient(rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    }

    .player-name {
      text-align: center;
      padding: 14px;
      font-size: 24px;
      font-weight: bold;
      background: rgba(0,0,0,0.42);
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }

    .score-row {
      position: absolute;
      bottom: 60px;
      left: 160px;
      right: 240px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px;
    }

    .score-box {
      background: rgba(0,0,0,0.52);
      border-radius: 12px;
      text-align: center;
      padding: 12px;
      box-shadow: 0 0 14px rgba(0, 0, 0, 0.3);
    }

    .score-name {
      font-size: 16px;
      color: #cbd5e1;
      margin-bottom: 4px;
    }

    .score-points {
      font-size: 28px;
      font-weight: bold;
      color: #ffd54a;
      text-shadow: 0 2px 6px rgba(0,0,0,0.45);
    }
  </style>
</head>
<body>
  <div class="canvas">

    <div class="streamer-box">
      <img src="avatar.png" id="avatar" alt="Avatar">
    </div>

    <div class="quiz-box">
      <div class="quiz-text" id="quizText">Warte auf Frage</div>
    </div>

    <div class="timer" id="timerText"></div>
    <div class="answer-box" id="answerBox"></div>

    <div class="players-row">
      <div class="player-slot">
        <div class="camera-frame">Slot 1</div>
        <div class="player-name" id="p1">Leer</div>
      </div>
      <div class="player-slot">
        <div class="camera-frame">Slot 2</div>
        <div class="player-name" id="p2">Leer</div>
      </div>
      <div class="player-slot">
        <div class="camera-frame">Slot 3</div>
        <div class="player-name" id="p3">Leer</div>
      </div>
      <div class="player-slot">
        <div class="camera-frame">Slot 4</div>
        <div class="player-name" id="p4">Leer</div>
      </div>
    </div>

    <div class="score-row" id="scoreRow"></div>

  </div>

  <script>
    const socket = io();

    const quizText = document.getElementById("quizText");
    const timerText = document.getElementById("timerText");
    const answerBox = document.getElementById("answerBox");
    const scoreRow = document.getElementById("scoreRow");

    const playerEls = {
      1: document.getElementById("p1"),
      2: document.getElementById("p2"),
      3: document.getElementById("p3"),
      4: document.getElementById("p4")
    };

    function clearPlayers() {
      for (let i = 1; i <= 4; i++) {
        playerEls[i].textContent = "Leer";
      }
    }

    socket.on("lobbyUpdate", (players) => {
      clearPlayers();

      players.forEach((p) => {
        if (playerEls[p.slot]) {
          playerEls[p.slot].textContent = p.name;
        }
      });
    });

    socket.on("syncState", (state) => {
      if (state.activeQuestion) {
        quizText.textContent = state.activeQuestion;
      } else {
        quizText.textContent = "Warte auf Frage";
      }

      if (state.timer && state.timer.total > 0) {
        timerText.textContent = "⏱ " + state.timer.remaining + "s";
      } else {
        timerText.textContent = "";
      }

      if (state.answerVisible && state.currentAnswer) {
        answerBox.innerHTML = `
          <span style="color:#22c55e;">Richtige Antwort:</span><br>
          <strong>${state.currentAnswer}</strong>
        `;
      } else if (state.firstBuzz) {
        answerBox.innerHTML = `
          <span style="color:#ffd54a;">🔔 ${state.firstBuzz}</span>
        `;
      } else {
        answerBox.innerHTML = "";
      }

      const entries = Object.entries(state.scores || {});
      scoreRow.innerHTML = entries
        .sort((a, b) => b[1] - a[1])
        .map(([name, points]) => `
          <div class="score-box">
            <div class="score-name">${name}</div>
            <div class="score-points">${points}</div>
          </div>
        `)
        .join("");
    });
  </script>
</body>
</html>
