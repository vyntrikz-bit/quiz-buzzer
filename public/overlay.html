<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>OBS Overlay</title>
<script src="/socket.io/socket.io.js"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

.stage {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.canvas {
  position: absolute;
  width: 1920px;
  height: 1080px;
  transform-origin: top left;
  background: url("background.png") center/cover no-repeat;
}

/* HOST */
.host-box {
  position: absolute;
  left: 20px;
  top: 255px;
  width: 500px;
  height: 280px;
  border: none;
  border-radius: 0;
  overflow: hidden;
  box-sizing: border-box;
  background: transparent;
}

#avatar {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* BOARD */
.board-wrap {
  position: absolute;
  top: 20px;
  left: 550px;
  width: 1100px;
}

.categories {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.category {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: white;
}

.board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.cell {
  height: 90px;
  background: #f2a7c2;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 50px;
  font-weight: bold;
  border-radius: 8px;
  color: #111;
}

.cell.used {
  opacity: 0.3;
}

/* QUESTION PANEL */
.question-wrap {
  position: absolute;
  top: 20px;
  left: 550px;
  width: 1100px;
  height: 500px;
  background: #e8a4bc;
  border-radius: 20px;
  display: none;
  box-sizing: border-box;
  overflow: hidden;
}

.question-category {
  position: absolute;
  top: 14px;
  left: 18px;
  font-size: 30px;
  font-weight: bold;
  color: white;
}

.question-value {
  position: absolute;
  top: 14px;
  right: 18px;
  font-size: 30px;
  font-weight: bold;
  color: white;
}

.question-center {
  position: absolute;
  top: 70px;
  left: 25px;
  right: 25px;
  bottom: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 50px;
  font-weight: bold;
  color: black;
}

.question-image {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 8px;
}

.answer-box {
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  color: black;
  padding: 10px 25px;
  border-radius: 10px;
  font-size: 30px;
  display: none;
  max-width: 80%;
  text-align: center;
  font-weight: bold;
}

/* PLAYERS */
.players-row {
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: 20px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}

.player-column {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.player-cam {
  height: 275px;
  border: 4px solid white;
  border-radius: 20px;
  box-sizing: border-box;
}

/* NAME */
.name-box {
  background: white;
  color: black;
  text-align: center;
  font-weight: bold;
  padding: 6px;
  border-radius: 10px;
  font-size: 22px;
  transition: all 0.2s ease;
}

/* BUZZ HIGHLIGHT AUF NAME */
.name-box.active {
  background: #ff3b3b;
  color: white;
  animation: buzzGlow 0.8s infinite alternate;
}

@keyframes buzzGlow {
  from {
    transform: scale(1.04);
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.65);
  }
  to {
    transform: scale(1.10);
    box-shadow: 0 0 24px rgba(255, 0, 0, 0.95);
  }
}

/* SCORE */
.score-box {
  background: black;
  border: 3px solid white;
  text-align: center;
  font-size: 22px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  padding: 4px 0;
  box-sizing: border-box;
}
</style>
</head>

<body>
<div class="stage">
<div class="canvas" id="canvas">

  <!-- BOARD -->
  <div class="board-wrap" id="boardWrap">
    <div class="categories" id="categories">
      <div class="category">Thema 1</div>
      <div class="category">Thema 2</div>
      <div class="category">Thema 3</div>
      <div class="category">Thema 4</div>
      <div class="category">Thema 5</div>
    </div>
    <div class="board" id="board"></div>
  </div>

  <!-- QUESTION -->
  <div class="question-wrap" id="questionWrap">
    <div class="question-category" id="qCategory"></div>
    <div class="question-value" id="qValue"></div>
    <div class="question-center" id="qCenter"></div>
    <div class="answer-box" id="answerBox"></div>
  </div>

  <!-- HOST -->
  <div class="host-box">
    <img src="avatar.png" id="avatar" alt="" onerror="this.style.display='none'">
  </div>

  <!-- PLAYERS -->
  <div class="players-row">
    <div class="player-column">
      <div class="player-cam" id="cam1"></div>
      <div class="name-box" id="name1">Leer</div>
      <div class="score-box" id="score1">0</div>
    </div>

    <div class="player-column">
      <div class="player-cam" id="cam2"></div>
      <div class="name-box" id="name2">Leer</div>
      <div class="score-box" id="score2">0</div>
    </div>

    <div class="player-column">
      <div class="player-cam" id="cam3"></div>
      <div class="name-box" id="name3">Leer</div>
      <div class="score-box" id="score3">0</div>
    </div>

    <div class="player-column">
      <div class="player-cam" id="cam4"></div>
      <div class="name-box" id="name4">Leer</div>
      <div class="score-box" id="score4">0</div>
    </div>

    <div class="player-column">
      <div class="player-cam" id="cam5"></div>
      <div class="name-box" id="name5">Leer</div>
      <div class="score-box" id="score5">0</div>
    </div>
  </div>

</div>
</div>

<script>
const socket = io();

const boardWrap = document.getElementById("boardWrap");
const questionWrap = document.getElementById("questionWrap");

const qCategory = document.getElementById("qCategory");
const qValue = document.getElementById("qValue");
const qCenter = document.getElementById("qCenter");
const answerBox = document.getElementById("answerBox");

const values = [200, 300, 400, 500, 600];
const board = document.getElementById("board");

let slotPlayers = { 1:null, 2:null, 3:null, 4:null, 5:null };

// Board einmal aufbauen
for (let r = 0; r < 5; r++) {
  for (let c = 0; c < 5; c++) {
    const div = document.createElement("div");
    div.className = "cell";
    div.innerText = values[r];
    board.appendChild(div);
  }
}

socket.on("lobbyUpdate", (players) => {
  slotPlayers = { 1:null, 2:null, 3:null, 4:null, 5:null };

  for (let i = 1; i <= 5; i++) {
    document.getElementById("name" + i).innerText = "Leer";
  }

  players.forEach((p) => {
    slotPlayers[p.slot] = p.name;
    document.getElementById("name" + p.slot).innerText = p.name;
  });
});

socket.on("syncState", (state) => {
  // Kategorien
  const categoryNodes = document.querySelectorAll(".category");
  if (state.categories && state.categories.length === 5) {
    state.categories.forEach((cat, i) => {
      if (categoryNodes[i]) categoryNodes[i].innerText = cat;
    });
  }

  // Used Cells
  const allCells = document.querySelectorAll(".cell");
  allCells.forEach((cell, i) => {
    cell.classList.toggle("used", (state.usedCells || []).includes(i));
  });

  // Buzz-Highlight auf Namen zurücksetzen
  for (let i = 1; i <= 5; i++) {
    document.getElementById("name" + i).classList.remove("active");
  }

  // Buzz-Highlight auf aktuellen Spieler-Namen
  if (state.firstBuzz) {
    for (let i = 1; i <= 5; i++) {
      if (slotPlayers[i] === state.firstBuzz) {
        document.getElementById("name" + i).classList.add("active");
      }
    }
  }

  // Scores
  for (let i = 1; i <= 5; i++) {
    const name = slotPlayers[i];
    const scoreValue =
      name && typeof state.scores[name] !== "undefined"
        ? state.scores[name]
        : 0;
    document.getElementById("score" + i).innerText = scoreValue;
  }

  // Board / Frage umschalten
  if (state.currentQuestion) {
    boardWrap.style.display = "none";
    questionWrap.style.display = "block";

    qCategory.innerText = state.currentQuestion.category || "";
    qValue.innerText = state.currentQuestion.value || "";

    if (state.questionVisible) {
      if (state.currentQuestion.image) {
        qCenter.innerHTML = `<img src="${state.currentQuestion.image}" class="question-image" alt="">`;
      } else {
        qCenter.innerText = state.currentQuestion.question || "";
      }
    } else {
      qCenter.innerHTML = "";
    }

    if (state.answerVisible) {
      answerBox.style.display = "block";
      answerBox.innerText = state.currentQuestion.answer || "";
    } else {
      answerBox.style.display = "none";
    }
  } else {
    boardWrap.style.display = "block";
    questionWrap.style.display = "none";
  }
});

// Auto-Scaling für F11 / Fenstergröße
function fit() {
  const canvas = document.getElementById("canvas");
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  canvas.style.transform = `scale(${scale}) translate(-50%, -50%)`;
  canvas.style.left = "50%";
  canvas.style.top = "50%";
}

window.addEventListener("resize", fit);
window.addEventListener("load", fit);
fit();
</script>

</body>
</html>
