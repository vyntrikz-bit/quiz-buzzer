<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>OBS Overlay</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      background: transparent;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 1920px;
      height: 1080px;
    }

    .streamer-box {
      position: absolute;
      top: 30px;
      left: 30px;
      width: 360px;
      height: 220px;
      background: rgba(15, 23, 42, 0.85);
      border: 3px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .quiz-box {
      position: absolute;
      top: 30px;
      right: 30px;
      width: 1120px;
      height: 500px;
      background: rgba(15, 23, 42, 0.75);
      border: 3px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      box-sizing: border-box;
    }

    .quiz-text {
      font-size: 52px;
      line-height: 1.2;
      font-weight: bold;
    }

    .players-row {
      position: absolute;
      left: 30px;
      right: 30px;
      bottom: 30px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .player-slot {
      background: rgba(15, 23, 42, 0.75);
      border: 3px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      overflow: hidden;
      height: 280px;
      display: flex;
      flex-direction: column;
    }

    .camera-frame {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.45);
      font-size: 26px;
      background:
        linear-gradient(rgba(255,255,255,0.06), rgba(255,255,255,0.03));
    }

    .player-name {
      padding: 16px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      background: rgba(0,0,0,0.35);
      min-height: 32px;
    }

    .timer {
      position: absolute;
      top: 550px;
      right: 60px;
      font-size: 40px;
      font-weight: bold;
      color: #60a5fa;
      min-width: 180px;
      text-align: right;
    }

    .answer-box {
      position: absolute;
      top: 610px;
      right: 30px;
      width: 1120px;
      min-height: 90px;
      background: rgba(0,0,0,0.45);
      border-radius: 18px;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
      font-size: 34px;
      line-height: 1.3;
      color: #22c55e;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="streamer-box">
      Streamer / Avatar
    </div>

    <div class="quiz-box">
      <div class="quiz-text" id="quizText">Warte auf die nächste Frage</div>
    </div>

    <div class="timer" id="timerText"></div>
    <div class="answer-box" id="answerBox"></div>

    <div class="players-row" id="playersRow">
      <div class="player-slot">
        <div class="camera-frame">Kamera Slot 1</div>
        <div class="player-name" id="player1">Leer</div>
      </div>
      <div class="player-slot">
        <div class="camera-frame">Kamera Slot 2</div>
        <div class="player-name" id="player2">Leer</div>
      </div>
      <div class="player-slot">
        <div class="camera-frame">Kamera Slot 3</div>
        <div class="player-name" id="player3">Leer</div>
      </div>
      <div class="player-slot">
        <div class="camera-frame">Kamera Slot 4</div>
        <div class="player-name" id="player4">Leer</div>
      </div>
    </div>
  </div>

  <script>
    const socket = io();

    const quizText = document.getElementById("quizText");
    const timerText = document.getElementById("timerText");
    const answerBox = document.getElementById("answerBox");

    const playerEls = {
      1: document.getElementById("player1"),
      2: document.getElementById("player2"),
      3: document.getElementById("player3"),
      4: document.getElementById("player4")
    };

    function clearPlayers() {
      for (let i = 1; i <= 4; i++) {
        playerEls[i].textContent = "Leer";
      }
    }

    socket.on("lobbyUpdate", (players) => {
      clearPlayers();

      players.forEach((player) => {
        if (playerEls[player.slot]) {
          playerEls[player.slot].textContent = player.name;
        }
      });
    });

    socket.on("syncState", (state) => {
      if (state.activeQuestion) {
        quizText.textContent = state.activeQuestion;
      } else {
        quizText.textContent = "Warte auf die nächste Frage";
      }

      if (state.timer && state.timer.total > 0) {
        timerText.textContent = "Timer: " + state.timer.remaining + "s";
      } else {
        timerText.textContent = "";
      }

      if (state.answerVisible && state.currentAnswer) {
        answerBox.innerHTML = `
          Richtige Antwort:<br>
          <strong>${state.currentAnswer}</strong>
        `;
      } else if (state.firstBuzz) {
        answerBox.innerHTML = `
          <span style="color:#ffd54a;">🔔 ${state.firstBuzz} hat gebuzzert</span>
        `;
      } else {
        answerBox.innerHTML = "";
      }
    });
  </script>
</body>
</html>
