<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Host</title>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 10px;
    }

    .category {
      background: #1e2a5a;
      padding: 16px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      outline: none;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 10px;
    }

    .cell {
      background: #2b3c8f;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      cursor: pointer;
    }

    .cell.used {
      background: #111;
      color: #555;
    }

    .scores {
      display: flex;
      gap: 10px;
      padding: 10px;
      flex-wrap: wrap;
    }

    .score {
      background: #162038;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      min-width: 120px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .overlay.show {
      display: flex;
    }

    .question {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .buzz {
      font-size: 30px;
      color: #ffd54a;
      margin-bottom: 10px;
    }

    .sub {
      color: #aaa;
      margin-bottom: 20px;
    }

    .controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .correct { background: #2563eb; color: white; }
    .wrong { background: #dc2626; color: white; }
    .reset { background: #e67e22; color: white; }
    .undo { background: #9333ea; color: white; }
    .close { background: #555; color: white; }
    .sound { background: #16a34a; color: white; }
  </style>
</head>

<body>

<div class="categories" id="categories">
  <div class="category" contenteditable="true">Thema 1</div>
  <div class="category" contenteditable="true">Thema 2</div>
  <div class="category" contenteditable="true">Thema 3</div>
  <div class="category" contenteditable="true">Thema 4</div>
  <div class="category" contenteditable="true">Thema 5</div>
</div>

<div class="board" id="board"></div>

<div class="scores" id="scores"></div>

<div class="overlay" id="overlay">

  <div class="controls">
    <button class="sound" id="soundBtn">Ton aktivieren</button>
    <button class="correct" id="correctBtn">Richtig</button>
    <button class="wrong" id="wrongBtn">Falsch</button>
    <button class="reset" id="resetBtn">Reset</button>
    <button class="undo" id="undoBtn">Undo</button>
    <button class="close" id="closeBtn">Schließen</button>
  </div>

  <div class="question" id="question"></div>
  <div class="buzz" id="buzz"></div>
  <div class="sub" id="sub"></div>

</div>

<script>
const socket = io();

const values = [100,200,300,400,500];
const board = document.getElementById("board");
const overlay = document.getElementById("overlay");
const questionEl = document.getElementById("question");
const buzzEl = document.getElementById("buzz");
const subEl = document.getElementById("sub");
const scoresEl = document.getElementById("scores");

const questions = [
  "Frage 1","Frage 2","Frage 3","Frage 4","Frage 5",
  "Frage 6","Frage 7","Frage 8","Frage 9","Frage 10",
  "Frage 11","Frage 12","Frage 13","Frage 14","Frage 15",
  "Frage 16","Frage 17","Frage 18","Frage 19","Frage 20",
  "Frage 21","Frage 22","Frage 23","Frage 24","Frage 25"
];

let used = [];
let index = 0;

// Board bauen
for (let r=0;r<5;r++){
  for (let c=0;c<5;c++){
    let cell = document.createElement("div");
    cell.className="cell";
    cell.innerText = values[r];

    let i = index;
    let val = values[r];

    cell.onclick = () => {
      if (used.includes(i)) return;

      used.push(i);
      cell.classList.add("used");

      socket.emit("openQuestion", {
        questionText: questions[i],
        value: val
      });
    };

    board.appendChild(cell);
    index++;
  }
}

// Kategorien speichern
document.querySelectorAll(".category").forEach(el=>{
  el.onblur = ()=>{
    let cats = [...document.querySelectorAll(".category")].map(e=>e.innerText);
    socket.emit("updateCategories", cats);
  };
});

// Punkte anzeigen
function renderScores(scores){
  scoresEl.innerHTML="";
  Object.entries(scores)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([name,points])=>{
      let div=document.createElement("div");
      div.className="score";
      div.innerHTML=`<b>${name}</b><br>${points}`;
      scoresEl.appendChild(div);
    });
}

// Sync
socket.on("syncState",(state)=>{

  renderScores(state.scores || {});

  if(state.activeQuestion){
    overlay.classList.add("show");
    questionEl.innerText = state.activeQuestion;
  }else{
    overlay.classList.remove("show");
  }

  if(state.firstBuzz){
    buzzEl.innerHTML = `🔔 ${state.firstBuzz}`;
  }else{
    buzzEl.innerText = "Noch niemand";
  }

  if(state.eliminatedPlayers?.length){
    subEl.innerText = "Raus: "+state.eliminatedPlayers.join(", ");
  }else{
    subEl.innerText="";
  }

});

// Sound
let ctx;
document.getElementById("soundBtn").onclick = ()=>{
  ctx = new AudioContext();
};

// Buzzer Sound
socket.on("playerBuzzed", ()=>{
  if(!ctx) return;
  let o=ctx.createOscillator();
  let g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value=800;
  g.gain.value=0.2;
  o.start();
  o.stop(ctx.currentTime+0.2);
});

// Buttons
document.getElementById("correctBtn").onclick=()=>socket.emit("markCorrect");
document.getElementById("wrongBtn").onclick=()=>socket.emit("markWrong");
document.getElementById("resetBtn").onclick=()=>socket.emit("resetBuzzer");
document.getElementById("undoBtn").onclick=()=>socket.emit("undoLastAction");
document.getElementById("closeBtn").onclick=()=>socket.emit("closeQuestion");

</script>

</body>
</html>
