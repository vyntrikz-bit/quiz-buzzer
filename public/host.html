<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Host</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 10px;
    }

    .category {
      background: #1e2a5a;
      padding: 16px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 10px;
    }

    .cell {
      background: #2b3c8f;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }

    .cell:hover {
      background: #3a4fc0;
    }

    .cell.used {
      background: #111;
      color: #555;
      cursor: default;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 40px;
      z-index: 999;
    }

    .overlay.show {
      display: flex;
    }

    .question-text {
      font-size: 44px;
      max-width: 1100px;
      margin-bottom: 24px;
      line-height: 1.25;
    }

    .buzzed-text {
      font-size: 30px;
      color: #ffd54a;
      margin-bottom: 24px;
    }

    .host-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .unlock-btn {
      background: #16a34a;
      color: white;
    }

    .reset-btn {
      background: #e67e22;
      color: white;
    }

    .close-btn {
      background: #c0392b;
      color: white;
    }
  </style>
</head>
<body>
  <div class="categories">
    <div class="category">Thema 1</div>
    <div class="category">Thema 2</div>
    <div class="category">Thema 3</div>
    <div class="category">Thema 4</div>
    <div class="category">Thema 5</div>
  </div>

  <div class="board" id="board"></div>

  <div class="overlay" id="overlay">
    <div class="host-controls">
      <button class="unlock-btn" id="unlockSoundBtn">Ton freischalten</button>
      <button class="reset-btn" id="resetBtn">Buzzer zurücksetzen</button>
      <button class="close-btn" id="closeBtn">Frage schließen</button>
    </div>

    <div class="question-text" id="questionText"></div>
    <div class="buzzed-text" id="buzzedText">Noch niemand hat gebuzzert</div>
  </div>

  <script>
    const socket = io();

    const values = [100, 200, 300, 400, 500];
    const board = document.getElementById("board");
    const overlay = document.getElementById("overlay");
    const questionText = document.getElementById("questionText");
    const buzzedText = document.getElementById("buzzedText");
    const unlockSoundBtn = document.getElementById("unlockSoundBtn");
    const resetBtn = document.getElementById("resetBtn");
    const closeBtn = document.getElementById("closeBtn");

    const questions = [
  "Thema 1 - 100",
  "Thema 2 - 100",
  "Thema 3 - 100",
  "Thema 4 - 100",
  "Thema 5 - 100",

  "Thema 1 - 200",
  "Thema 2 - 200",
  "Thema 3 - 200",
  "Thema 4 - 200",
  "Thema 5 - 200",

  "Thema 1 - 300",
  "Thema 2 - 300",
  "Thema 3 - 300",
  "Thema 4 - 300",
  "Thema 5 - 300",

  "Thema 1 - 400",
  "Thema 2 - 400",
  "Thema 3 - 400",
  "Thema 4 - 400",
  "Thema 5 - 400",

  "Thema 1 - 500",
  "Thema 2 - 500",
  "Thema 3 - 500",
  "Thema 4 - 500",
  "Thema 5 - 500"
];

    const usedCells = [];
    let audioUnlocked = false;
    let audioContext = null;

    function unlockAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.connect(gain);
      gain.connect(audioContext.destination);

      gain.gain.value = 0.001;
      osc.frequency.value = 440;
      osc.start();
      osc.stop(audioContext.currentTime + 0.05);

      audioUnlocked = true;
      unlockSoundBtn.textContent = "Ton aktiv";
    }

    function playBuzzSound() {
      if (!audioUnlocked) return;
      if (!audioContext) return;

      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.type = "square";
      osc.frequency.setValueAtTime(880, audioContext.currentTime);
      gain.gain.setValueAtTime(0.15, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.25);

      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.start();
      osc.stop(audioContext.currentTime + 0.25);
    }

    let index = 0;

    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 5; col++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = values[row];

        const currentIndex = index;

        cell.addEventListener("click", () => {
          if (usedCells.includes(currentIndex)) return;

          usedCells.push(currentIndex);
          cell.classList.add("used");

          socket.emit("openQuestion", questions[currentIndex]);
        });

        board.appendChild(cell);
        index++;
      }
    }

    socket.on("syncState", (state) => {
  if (state.activeQuestion) {
    questionText.textContent = state.activeQuestion;
    overlay.classList.add("show");
  } else {
    overlay.classList.remove("show");
    buzzedText.textContent = "Noch niemand hat gebuzzert";
  }

  if (state.firstBuzz) {
    buzzedText.textContent = state.firstBuzz + " hat gebuzzert! Buzzer ist gesperrt bis Reset.";
  } else if (state.activeQuestion) {
    buzzedText.textContent = "Noch niemand hat gebuzzert";
  }
});

    socket.on("playerBuzzed", (name) => {
      buzzedText.textContent = name + " hat gebuzzert!";
      playBuzzSound();
    });

    unlockSoundBtn.addEventListener("click", unlockAudio);

    resetBtn.addEventListener("click", () => {
      socket.emit("resetBuzzer");
    });

    closeBtn.addEventListener("click", () => {
      socket.emit("closeQuestion");
    });
  </script>
</body>
</html>
