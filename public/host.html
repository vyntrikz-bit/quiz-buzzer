<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Host</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px;
      background: #121a2d;
      position: sticky;
      top: 0;
      z-index: 20;
      align-items: center;
    }

    button, select, input {
      border: none;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      padding: 12px 16px;
      font-weight: bold;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    input, select {
      background: #1f2937;
      color: white;
      padding: 12px;
    }

    .primary { background: #2563eb; }
    .danger { background: #dc2626; }
    .success { background: #16a34a; }
    .warn { background: #e67e22; }
    .purple { background: #9333ea; }
    .active-board { background: #16a34a; }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1f2937;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: bold;
    }

    .volume-wrap input[type="range"] {
      width: 130px;
      padding: 0;
      background: transparent;
    }

    .wrap {
      padding: 14px;
    }

    .board-switch {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .category {
      background: #162038;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      min-height: 28px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .cell {
      height: 94px;
      background: #f2a7c2;
      color: #18181b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    .cell:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.22);
    }

    .cell.used {
      opacity: 0.28;
      cursor: default;
    }

    .cell.selected {
      outline: 4px solid #60a5fa;
      outline-offset: -4px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(0, 0.75fr);
      gap: 20px;
      margin-top: 18px;
      align-items: start;
    }

    .score-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .score-card {
      background: #162038;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .score-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .score-points {
      font-size: 28px;
      font-weight: 800;
      color: #ffd54a;
    }

    .panel {
      background: #111827;
      border-radius: 14px;
      padding: 18px;
      min-width: 0;
      overflow: hidden;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #93c5fd;
    }

    .muted {
      color: #cbd5e1;
      font-size: 14px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .preview-block {
      background: #0f172a;
      border-radius: 16px;
      padding: 14px;
    }

    .preview-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #93c5fd;
    }

    .big-preview {
      background: #e8a4bc;
      color: #111;
      border-radius: 20px;
      min-height: 300px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .preview-category {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 28px;
      font-weight: 800;
    }

    .preview-value {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 28px;
      font-weight: 800;
    }

    .preview-center {
      height: 100%;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 60px;
      box-sizing: border-box;
      font-size: 40px;
      font-weight: 800;
      line-height: 1.2;
    }

    .preview-image {
      max-width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
    }

    .preview-answer {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: white;
      color: #111;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 28px;
      font-weight: 800;
      display: none;
      max-width: 80%;
      text-align: center;
    }

    .manual-box {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status-line {
      margin-top: 12px;
      color: #ffd54a;
      font-size: 18px;
      min-height: 28px;
    }

    .help-box {
      white-space: pre-wrap;
      line-height: 1.45;
      color: #e5e7eb;
      font-size: 14px;
    }

    @media (max-width: 1200px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .categories,
      .board,
      .score-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="primary" id="showQuestionBtn">Show Question</button>
    <button class="success" id="showAnswerBtn">Show Answer</button>
    <button id="hideAnswerBtn">Hide Answer</button>
    <button class="success" id="correctBtn">Correct</button>
    <button class="danger" id="wrongBtn">Wrong</button>
    <button class="warn" id="resetBuzzerBtn">Reset Buzzer</button>
    <button class="purple" id="undoBtn">Undo</button>
    <button id="timer20Btn">20s Timer</button>
    <button id="timerStopBtn">Stop Timer</button>
    <button id="timerResetBtn">Reset Timer</button>
    <button id="closeQuestionBtn">Close Question</button>
    <button id="resetBoardBtn">Reset Current Board</button>
    <button class="danger" id="newGameBtn">New Game</button>

    <label class="volume-wrap">
      Sound
      <input id="volumeSlider" type="range" min="0" max="100" value="35">
      <span id="volumeValue">35%</span>
    </label>
  </div>

  <div class="wrap">
    <div class="board-switch">
      <strong>Switch board:</strong>
      <button id="board1Btn">Board 1</button>
      <button id="board2Btn">Board 2</button>
      <span class="muted" id="boardInfo"></span>
    </div>

    <div class="categories" id="categories">
      <div class="category">Category 1</div>
      <div class="category">Category 2</div>
      <div class="category">Category 3</div>
      <div class="category">Category 4</div>
      <div class="category">Category 5</div>
    </div>

    <div class="board" id="board"></div>
    <div class="score-grid" id="scoreGrid"></div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-title">Question Data</div>
        <div class="help-box" id="questionInfo">Select a cell to preview the question.</div>

        <div class="status-line" id="statusLine"></div>

        <div class="manual-box">
          <strong>Backup points:</strong>
          <select id="playerSelect"></select>
          <input id="manualPointsInput" type="number" min="1" step="1" value="100">
          <button class="success" id="manualAddBtn">Add Points</button>
          <button class="danger" id="manualSubtractBtn">Subtract Points</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Preview</div>

        <div class="preview-grid">
          <div class="preview-block">
            <div class="preview-title">Private Host Preview</div>
            <div class="big-preview">
              <div class="preview-category" id="privateCategory"></div>
              <div class="preview-value" id="privateValue"></div>
              <div class="preview-center" id="privateCenter"></div>
              <div class="preview-answer" id="privateAnswer"></div>
            </div>
          </div>

          <div class="preview-block">
            <div class="preview-title">Public View</div>
            <div class="big-preview">
              <div class="preview-category" id="publicCategory"></div>
              <div class="preview-value" id="publicValue"></div>
              <div class="preview-center" id="publicCenter"></div>
              <div class="preview-answer" id="publicAnswer"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const socket = io();

    const QUIZ = {
      1: {
        categories: ["Test", "Test32", "Test", "Test", "Test"],
        questions: [
          { category: "Dragons", value: 200, question: "Question 1", answer: "Answer 1", image: "" },
          { category: "LCK", value: 200, question: "Question 2", answer: "Answer 2", image: "" },
          { category: "Lore", value: 200, question: "Question 3", answer: "Answer 3", image: "" },
          { category: "Riot Pls", value: 200, question: "Question 4", answer: "Answer 4", image: "" },
          { category: "Order Must Be", value: 200, question: "Question 5", answer: "Answer 5", image: "" },

          { category: "Dragons", value: 300, question: "Question 6", answer: "Answer 6", image: "" },
          { category: "LCK", value: 300, question: "Question 7", answer: "Answer 7", image: "" },
          { category: "Lore", value: 300, question: "Question 8", answer: "Answer 8", image: "" },
          { category: "Riot Pls", value: 300, question: "Question 9", answer: "Answer 9", image: "" },
          { category: "Order Must Be", value: 300, question: "Question 10", answer: "Answer 10", image: "" },

          { category: "Dragons", value: 400, question: "Question 11", answer: "Answer 11", image: "" },
          { category: "LCK", value: 400, question: "Question 12", answer: "Answer 12", image: "" },
          { category: "Lore", value: 400, question: "Question 13", answer: "Answer 13", image: "" },
          { category: "Riot Pls", value: 400, question: "Question 14", answer: "Answer 14", image: "" },
          { category: "Order Must Be", value: 400, question: "Question 15", answer: "Answer 15", image: "" },

          { category: "Dragons", value: 500, question: "Question 16", answer: "Answer 16", image: "" },
          { category: "LCK", value: 500, question: "Question 17", answer: "Answer 17", image: "" },
          { category: "Lore", value: 500, question: "Question 18", answer: "Answer 18", image: "" },
          { category: "Riot Pls", value: 500, question: "Question 19", answer: "Answer 19", image: "" },
          { category: "Order Must Be", value: 500, question: "Question 20", answer: "Answer 20", image: "" },

          { category: "Dragons", value: 600, question: "Question 21", answer: "Answer 21", image: "" },
          { category: "LCK", value: 600, question: "Question 22", answer: "Answer 22", image: "" },
          { category: "Lore", value: 600, question: "Question 23", answer: "Answer 23", image: "" },
          { category: "Riot Pls", value: 600, question: "Question 24", answer: "Answer 24", image: "" },
          { category: "Order Must Be", value: 600, question: "Question 25", answer: "Answer 25", image: "" }
        ]
      },
      2: {
        categories: ["Champion Details", "Pick & Ban", "Who Am I", "Abilities", "Ingame Quest"],
        questions: [
          { category: "Champion Details", value: 200, question: "Question 26", answer: "Answer 26", image: "" },
          { category: "Pick & Ban", value: 200, question: "Question 27", answer: "Answer 27", image: "" },
          { category: "Who Am I", value: 200, question: "Question 28", answer: "Answer 28", image: "" },
          { category: "Abilities", value: 200, question: "Question 29", answer: "Answer 29", image: "" },
          { category: "Ingame Quest", value: 200, question: "Question 30", answer: "Answer 30", image: "" },

          { category: "Champion Details", value: 300, question: "Question 31", answer: "Answer 31", image: "" },
          { category: "Pick & Ban", value: 300, question: "Question 32", answer: "Answer 32", image: "" },
          { category: "Who Am I", value: 300, question: "Question 33", answer: "Answer 33", image: "" },
          { category: "Abilities", value: 300, question: "Question 34", answer: "Answer 34", image: "" },
          { category: "Ingame Quest", value: 300, question: "Question 35", answer: "Answer 35", image: "" },

          { category: "Champion Details", value: 400, question: "Question 36", answer: "Answer 36", image: "" },
          { category: "Pick & Ban", value: 400, question: "Question 37", answer: "Answer 37", image: "" },
          { category: "Who Am I", value: 400, question: "Question 38", answer: "Answer 38", image: "" },
          { category: "Abilities", value: 400, question: "Question 39", answer: "Answer 39", image: "" },
          { category: "Ingame Quest", value: 400, question: "Question 40", answer: "Answer 40", image: "" },

          { category: "Champion Details", value: 500, question: "Question 41", answer: "Answer 41", image: "" },
          { category: "Pick & Ban", value: 500, question: "Question 42", answer: "Answer 42", image: "" },
          { category: "Who Am I", value: 500, question: "Question 43", answer: "Answer 43", image: "" },
          { category: "Abilities", value: 500, question: "Question 44", answer: "Answer 44", image: "" },
          { category: "Ingame Quest", value: 500, question: "Question 45", answer: "Answer 45", image: "" },

          { category: "Champion Details", value: 600, question: "Question 46", answer: "Answer 46", image: "" },
          { category: "Pick & Ban", value: 600, question: "Question 47", answer: "Answer 47", image: "" },
          { category: "Who Am I", value: 600, question: "Question 48", answer: "Answer 48", image: "" },
          { category: "Abilities", value: 600, question: "Question 49", answer: "Answer 49", image: "" },
          { category: "Ingame Quest", value: 600, question: "Question 50", answer: "Answer 50", image: "" }
        ]
      }
    };

    let activeBoard = 1;
    let selectedIndex = null;
    let boardUsedCells = { 1: [], 2: [] };

    const board = document.getElementById("board");
    const scoreGrid = document.getElementById("scoreGrid");
    const playerSelect = document.getElementById("playerSelect");
    const manualPointsInput = document.getElementById("manualPointsInput");
    const statusLine = document.getElementById("statusLine");
    const boardInfo = document.getElementById("boardInfo");
    const questionInfo = document.getElementById("questionInfo");

    const privateCategory = document.getElementById("privateCategory");
    const privateValue = document.getElementById("privateValue");
    const privateCenter = document.getElementById("privateCenter");
    const privateAnswer = document.getElementById("privateAnswer");

    const publicCategory = document.getElementById("publicCategory");
    const publicValue = document.getElementById("publicValue");
    const publicCenter = document.getElementById("publicCenter");
    const publicAnswer = document.getElementById("publicAnswer");

    const volumeSlider = document.getElementById("volumeSlider");
    const volumeValue = document.getElementById("volumeValue");

    let audioCtx = null;
    let masterVolume = 0.35;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume().catch(() => {});
      }
      return audioCtx;
    }

    function applyVolume(volume) {
      masterVolume = Math.max(0, Math.min(1, volume));
    }

    function playBuzzer() {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "square";
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.exponentialRampToValueAtTime(90, now + 0.18);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.001, masterVolume * 0.45), now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.22);
    }

    function playCorrect() {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(420, now);
      osc.frequency.linearRampToValueAtTime(860, now + 0.2);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.001, masterVolume * 0.35), now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.25);
    }

    function playWrong() {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.linearRampToValueAtTime(85, now + 0.28);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.001, masterVolume * 0.35), now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.31);
    }

    const savedVolume = localStorage.getItem("hostVolume");
    const startVolume = savedVolume !== null ? Number(savedVolume) : 0.35;
    volumeSlider.value = Math.round(startVolume * 100);
    volumeValue.textContent = `${Math.round(startVolume * 100)}%`;
    applyVolume(startVolume);

    volumeSlider.addEventListener("input", () => {
      const newVolume = Number(volumeSlider.value) / 100;
      volumeValue.textContent = `${volumeSlider.value}%`;
      localStorage.setItem("hostVolume", String(newVolume));
      applyVolume(newVolume);
    });

    function getQuestionItem(boardNum, index) {
      return QUIZ[boardNum].questions[index];
    }

    function renderCategoriesForBoard() {
      const cats = QUIZ[activeBoard].categories;
      document.querySelectorAll(".category").forEach((node, i) => {
        node.textContent = cats[i] || "Category";
      });
    }

    function renderScores(scores, players) {
      const slotMap = { 1: null, 2: null, 3: null, 4: null, 5: null };
      (players || []).forEach((p) => {
        slotMap[p.slot] = p.name;
      });

      scoreGrid.innerHTML = "";
      for (let slot = 1; slot <= 5; slot++) {
        const playerName = slotMap[slot] || `Slot ${slot}`;
        const points = typeof scores[playerName] !== "undefined" ? scores[playerName] : 0;

        const card = document.createElement("div");
        card.className = "score-card";
        card.innerHTML = `
          <div class="score-name">${playerName}</div>
          <div class="score-points">${points}</div>
        `;
        scoreGrid.appendChild(card);
      }
    }

    function renderPlayerSelect(players) {
      const currentValue = playerSelect.value;
      playerSelect.innerHTML = "";
      players.forEach((player) => {
        const option = document.createElement("option");
        option.value = player.name;
        option.textContent = `${player.name} (Slot ${player.slot})`;
        playerSelect.appendChild(option);
      });
      if (currentValue && [...playerSelect.options].some((o) => o.value === currentValue)) {
        playerSelect.value = currentValue;
      }
    }

    function renderPrivatePreview(question) {
      if (!question) {
        privateCategory.textContent = "";
        privateValue.textContent = "";
        privateCenter.innerHTML = "";
        privateAnswer.style.display = "none";
        privateAnswer.textContent = "";
        questionInfo.textContent = "Select a cell to preview the question.";
        return;
      }

      privateCategory.textContent = question.category || "";
      privateValue.textContent = question.value || "";

      if (question.image) {
        privateCenter.innerHTML = `<img class="preview-image" src="${question.image}" alt="">`;
      } else {
        privateCenter.textContent = question.question || "";
      }

      privateAnswer.style.display = "block";
      privateAnswer.textContent = question.answer || "";

      questionInfo.textContent =
`Category: ${question.category}
Value: ${question.value}

Question:
${question.question}

Answer:
${question.answer}`;
    }

    function renderPublicPreview(stateQuestion, state) {
      if (!stateQuestion) {
        publicCategory.textContent = "";
        publicValue.textContent = "";
        publicCenter.innerHTML = "";
        publicAnswer.style.display = "none";
        publicAnswer.textContent = "";
        return;
      }

      publicCategory.textContent = stateQuestion.category || "";
      publicValue.textContent = stateQuestion.value || "";

      if (state && state.questionVisible) {
        if (stateQuestion.image) {
          publicCenter.innerHTML = `<img class="preview-image" src="${stateQuestion.image}" alt="">`;
        } else {
          publicCenter.textContent = stateQuestion.question || "";
        }
      } else {
        publicCenter.innerHTML = "";
        publicCenter.textContent = "";
      }

      if (state && state.answerVisible) {
        publicAnswer.style.display = "block";
        publicAnswer.textContent = stateQuestion.answer || "";
      } else {
        publicAnswer.style.display = "none";
        publicAnswer.textContent = "";
      }
    }

    function updateBoardButtons() {
      document.getElementById("board1Btn").classList.toggle("active-board", activeBoard === 1);
      document.getElementById("board2Btn").classList.toggle("active-board", activeBoard === 2);
    }

    function highlightSelectedCell() {
      const cells = board.querySelectorAll(".cell");
      cells.forEach((cell, i) => {
        cell.classList.toggle("selected", i === selectedIndex);
      });
    }

    function buildBoard() {
      board.innerHTML = "";

      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 5; col++) {
          const index = row * 5 + col;
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.textContent = [200, 300, 400, 500, 600][row];

          if ((boardUsedCells[activeBoard] || []).includes(index)) {
            cell.classList.add("used");
          }

          if (selectedIndex === index) {
            cell.classList.add("selected");
          }

          cell.addEventListener("click", () => {
            selectedIndex = index;
            renderPrivatePreview(getQuestionItem(activeBoard, selectedIndex));
            highlightSelectedCell();
            statusLine.textContent = `Cell selected on Board ${activeBoard}`;
          });

          board.appendChild(cell);
        }
      }
    }

    function switchBoard(boardNumber) {
      activeBoard = boardNumber;
      selectedIndex = null;
      renderCategoriesForBoard();
      updateBoardButtons();
      buildBoard();
      renderPrivatePreview(null);
      renderPublicPreview(null, null);
      socket.emit("setCurrentBoard", boardNumber);
      statusLine.textContent = `Board ${boardNumber} selected`;
    }

    socket.on("lobbyUpdate", (players) => {
      renderPlayerSelect(players);
    });

    socket.on("syncState", (runtimeState) => {
      boardUsedCells = runtimeState.usedCellsBoards || { 1: [], 2: [] };
      activeBoard = runtimeState.currentBoard || 1;

      renderCategoriesForBoard();
      updateBoardButtons();
      buildBoard();
      highlightSelectedCell();

      renderScores(runtimeState.scores || {}, runtimeState.lobbyPlayers || []);
      renderPlayerSelect(runtimeState.lobbyPlayers || []);

      boardInfo.textContent =
        `Active: Board ${activeBoard} | Board 1 open: ${25 - (boardUsedCells[1] || []).length} | Board 2 open: ${25 - (boardUsedCells[2] || []).length}`;

      renderPublicPreview(runtimeState.currentQuestion, runtimeState);
    });

    socket.on("playerBuzzed", () => {
      playBuzzer();
    });

    socket.on("answerResult", ({ result, name, points }) => {
      if (result === "correct") {
        playCorrect();
        statusLine.textContent = `${name} gets +${points} points automatically`;
      } else {
        playWrong();
        statusLine.textContent = `${name} gets -${points} points automatically`;
      }
    });

    socket.on("manualScoreChanged", ({ type, name, points }) => {
      if (type === "add") {
        statusLine.textContent = `${name} got +${points} points manually`;
      } else {
        statusLine.textContent = `${name} lost -${points} points manually`;
      }
    });

    document.getElementById("board1Btn").onclick = () => switchBoard(1);
    document.getElementById("board2Btn").onclick = () => switchBoard(2);

    document.getElementById("showQuestionBtn").onclick = () => {
      if (selectedIndex === null) {
        statusLine.textContent = "Please select a cell first";
        return;
      }

      const selectedQuestion = getQuestionItem(activeBoard, selectedIndex);
      renderPrivatePreview(selectedQuestion);
      socket.emit("showSelectedQuestion", {
  ...selectedQuestion,
  categories: QUIZ[activeBoard].categories
});
      statusLine.textContent = "Question shown publicly";
      getAudioCtx();
    };

    document.getElementById("showAnswerBtn").onclick = () => socket.emit("showAnswer");
    document.getElementById("hideAnswerBtn").onclick = () => socket.emit("hideAnswer");
    document.getElementById("correctBtn").onclick = () => socket.emit("markCorrect");
    document.getElementById("wrongBtn").onclick = () => socket.emit("markWrong");
    document.getElementById("resetBuzzerBtn").onclick = () => socket.emit("resetBuzzer");
    document.getElementById("undoBtn").onclick = () => socket.emit("undoLastAction");
    document.getElementById("timer20Btn").onclick = () => socket.emit("timerStart", 20);
    document.getElementById("timerStopBtn").onclick = () => socket.emit("timerStop");
    document.getElementById("timerResetBtn").onclick = () => socket.emit("timerReset");
    document.getElementById("closeQuestionBtn").onclick = () => socket.emit("closeQuestion");
    document.getElementById("resetBoardBtn").onclick = () => socket.emit("resetCurrentBoard");
    document.getElementById("newGameBtn").onclick = () => {
      if (!confirm("Do you really want to start a new game?")) return;
      socket.emit("newGameReset");
    };

    document.getElementById("manualAddBtn").onclick = () => {
      const name = playerSelect.value;
      const points = Number(manualPointsInput.value) || 0;
      if (!name || points <= 0) return;
      socket.emit("manualAddPoints", { name, points });
    };

    document.getElementById("manualSubtractBtn").onclick = () => {
      const name = playerSelect.value;
      const points = Number(manualPointsInput.value) || 0;
      if (!name || points <= 0) return;
      socket.emit("manualSubtractPoints", { name, points });
    };

    renderCategoriesForBoard();
    updateBoardButtons();
    buildBoard();
    renderPrivatePreview(null);
  </script>
</body>
</html>
