<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Quiz Host</title>

<style>
body {
  margin: 0;
  background: #0b0f1a;
  color: white;
  font-family: Arial;
}

.categories {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 10px;
}

.category {
  background: #1e2a5a;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 10px;
}

.cell {
  background: #2b3c8f;
  height: 100px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="categories">
  <div class="category">Thema 1</div>
  <div class="category">Thema 2</div>
  <div class="category">Thema 3</div>
  <div class="category">Thema 4</div>
  <div class="category">Thema 5</div>
</div>

<div class="board" id="board"></div>

<script>
const values = [100,200,300,400,500];
const board = document.getElementById("board");

for (let row=0; row<5; row++){
  for (let col=0; col<5; col++){
    let div = document.createElement("div");
    div.className="cell";
    div.innerText = values[row];
    board.appendChild(div);
  }
}
</script>

</body>
</html>
