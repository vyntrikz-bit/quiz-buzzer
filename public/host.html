<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Host</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px;
      background: #121a2d;
      position: sticky;
      top: 0;
      z-index: 20;
      align-items: center;
    }

    button, select, input, textarea {
      border: none;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      padding: 12px 16px;
      font-weight: bold;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    input, select, textarea {
      background: #1f2937;
      color: white;
      padding: 12px;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
      width: 100%;
    }

    .primary { background: #2563eb; }
    .danger { background: #dc2626; }
    .success { background: #16a34a; }
    .warn { background: #e67e22; }
    .purple { background: #9333ea; }
    .active-board { background: #16a34a; }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1f2937;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: bold;
    }

    .volume-wrap input[type="range"] {
      width: 130px;
      padding: 0;
      background: transparent;
    }

    .wrap {
      padding: 14px;
    }

    .board-switch {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .category {
      background: #162038;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      min-height: 28px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .cell {
      height: 94px;
      background: #f2a7c2;
      color: #18181b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    .cell:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.22);
    }

    .cell.used {
      opacity: 0.28;
      cursor: default;
    }

    .cell.selected {
      outline: 4px solid #60a5fa;
      outline-offset: -4px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
      margin-top: 18px;
    }

    .score-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .score-card {
      background: #162038;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .score-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .score-points {
      font-size: 28px;
      font-weight: 800;
      color: #ffd54a;
    }

    .panel {
      background: #111827;
      border-radius: 14px;
      padding: 18px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #93c5fd;
    }

    .muted {
      color: #cbd5e1;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .editor-grid {
      display: grid;
      gap: 10px;
    }

    .editor-row {
      display: grid;
      gap: 10px;
    }

    .editor-row.two {
      grid-template-columns: 1fr 140px;
    }

    .editor-row.five {
      grid-template-columns: repeat(5, 1fr);
    }

    .simple-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .preview-block {
      background: #0f172a;
      border-radius: 16px;
      padding: 14px;
    }

    .preview-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #93c5fd;
    }

    .big-preview {
      background: #e8a4bc;
      color: #111;
      border-radius: 20px;
      min-height: 300px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .preview-category {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 28px;
      font-weight: 800;
    }

    .preview-value {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 28px;
      font-weight: 800;
    }

    .preview-center {
      height: 100%;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 60px;
      box-sizing: border-box;
      font-size: 40px;
      font-weight: 800;
      line-height: 1.2;
    }

    .preview-image {
      max-width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
    }

    .preview-answer {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: white;
      color: #111;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 28px;
      font-weight: 800;
      display: none;
      max-width: 80%;
      text-align: center;
    }

    .manual-box {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status-line {
      margin-top: 12px;
      color: #ffd54a;
      font-size: 18px;
      min-height: 28px;
    }

    @media (max-width: 1200px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .preview-grid {
        grid-template-columns: 1fr;
      }

      .categories,
      .board,
      .score-grid,
      .editor-row.five {
        grid-template-columns: repeat(2, 1fr);
      }

      .editor-row.two {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="primary" id="showQuestionBtn">Show Question</button>
    <button class="success" id="showAnswerBtn">Show Answer</button>
    <button id="hideAnswerBtn">Hide Answer</button>
    <button class="success" id="correctBtn">Correct</button>
    <button class="danger" id="wrongBtn">Wrong</button>
    <button class="warn" id="resetBuzzerBtn">Reset Buzzer</button>
    <button class="purple" id="undoBtn">Undo</button>
    <button id="timer20Btn">20s Timer</button>
    <button id="timerStopBtn">Stop Timer</button>
    <button id="timerResetBtn">Reset Timer</button>
    <button id="closeQuestionBtn">Close Question</button>
    <button id="resetBoardBtn">Reset Current Board</button>
    <button class="danger" id="newGameBtn">New Game</button>

    <label class="volume-wrap">
      Sound
      <input id="volumeSlider" type="range" min="0" max="100" value="60">
      <span id="volumeValue">60%</span>
    </label>
  </div>

  <div class="wrap">
    <div class="board-switch">
      <strong>Switch board:</strong>
      <button id="board1Btn">Board 1</button>
      <button id="board2Btn">Board 2</button>

      <button id="toggleCategoryEditorBtn">Edit Categories</button>
      <button id="toggleQuestionEditorBtn">Edit Question</button>

      <span class="muted" id="boardInfo"></span>
    </div>

    <div class="categories" id="categories">
      <div class="category">Dragons</div>
      <div class="category">LCK</div>
      <div class="category">Lore</div>
      <div class="category">Riot Pls</div>
      <div class="category">Order Must Be</div>
    </div>

    <div class="board" id="board"></div>

    <div class="score-grid" id="scoreGrid"></div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-title">Editor</div>

        <div id="categoryEditor" class="hidden">
          <div class="editor-grid">
            <div class="muted">Edit the 5 categories for the current board, then save.</div>

            <div class="editor-row five">
              <input id="cat1" type="text" />
              <input id="cat2" type="text" />
              <input id="cat3" type="text" />
              <input id="cat4" type="text" />
              <input id="cat5" type="text" />
            </div>

            <div>
              <button class="success" id="saveCategoriesBtn">Save Categories</button>
            </div>
          </div>
        </div>

        <div id="questionEditor" class="hidden">
          <div class="editor-grid">
            <div class="muted" id="selectedCellInfo">Select a cell first, then edit the question.</div>

          <div class="editor-row two">
  <div>
    <label class="simple-label" for="editorCategory">Category</label>
    <select id="editorCategory"></select>
  </div>
  <div>
    <label class="simple-label" for="editorValue">Value</label>
    <input id="editorValue" type="text" readonly>
  </div>
</div>

            <div>
              <label class="simple-label" for="editorQuestion">Question</label>
              <textarea id="editorQuestion" placeholder="Type the question here..."></textarea>
            </div>

            <div>
              <label class="simple-label" for="editorAnswer">Answer</label>
              <textarea id="editorAnswer" placeholder="Type the answer here..."></textarea>
            </div>

            <div>
              <label class="simple-label" for="editorImage">Image URL (optional)</label>
              <input id="editorImage" type="text" placeholder="/images/example.png">
            </div>

            <div style="display:flex; gap:10px; flex-wrap:wrap;">
              <button class="success" id="saveQuestionBtn">Save Question</button>
              <button id="clearImageBtn">Clear Image</button>
              <button id="loadSelectedBtn">Reload Selected</button>
            </div>
          </div>
        </div>

        <div class="status-line" id="statusLine"></div>

        <div class="manual-box">
          <strong>Backup points:</strong>
          <select id="playerSelect"></select>
          <input id="manualPointsInput" type="number" min="1" step="1" value="100">
          <button class="success" id="manualAddBtn">Add Points</button>
          <button class="danger" id="manualSubtractBtn">Subtract Points</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Preview</div>

        <div class="preview-grid">
          <div class="preview-block">
            <div class="preview-title">Private Host Preview</div>
            <div class="big-preview">
              <div class="preview-category" id="privateCategory"></div>
              <div class="preview-value" id="privateValue"></div>
              <div class="preview-center" id="privateCenter"></div>
              <div class="preview-answer" id="privateAnswer"></div>
            </div>
          </div>

          <div class="preview-block">
            <div class="preview-title">Public View</div>
            <div class="big-preview">
              <div class="preview-category" id="publicCategory"></div>
              <div class="preview-value" id="publicValue"></div>
              <div class="preview-center" id="publicCenter"></div>
              <div class="preview-answer" id="publicAnswer"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <audio id="buzzerSound" src="/buzzer.mp3" preload="auto"></audio>
  <audio id="correctSound" src="/correct.mp3" preload="auto"></audio>
  <audio id="wrongSound" src="/wrong.mp3" preload="auto"></audio>

  <script>
    const socket = io();

    const values = [200, 300, 400, 500, 600];
    const board = document.getElementById("board");
    const scoreGrid = document.getElementById("scoreGrid");
    const playerSelect = document.getElementById("playerSelect");
    const manualPointsInput = document.getElementById("manualPointsInput");
    const statusLine = document.getElementById("statusLine");
    const boardInfo = document.getElementById("boardInfo");

    const privateCategory = document.getElementById("privateCategory");
    const privateValue = document.getElementById("privateValue");
    const privateCenter = document.getElementById("privateCenter");
    const privateAnswer = document.getElementById("privateAnswer");

    const publicCategory = document.getElementById("publicCategory");
    const publicValue = document.getElementById("publicValue");
    const publicCenter = document.getElementById("publicCenter");
    const publicAnswer = document.getElementById("publicAnswer");

    const categoryEditor = document.getElementById("categoryEditor");
    const questionEditor = document.getElementById("questionEditor");

    const editorCategory = document.getElementById("editorCategory");
    const editorValue = document.getElementById("editorValue");
    const editorQuestion = document.getElementById("editorQuestion");
    const editorAnswer = document.getElementById("editorAnswer");
    const editorImage = document.getElementById("editorImage");
    const selectedCellInfo = document.getElementById("selectedCellInfo");

    const catInputs = [
      document.getElementById("cat1"),
      document.getElementById("cat2"),
      document.getElementById("cat3"),
      document.getElementById("cat4"),
      document.getElementById("cat5")
    ];

    const buzzerSound = document.getElementById("buzzerSound");
    const correctSound = document.getElementById("correctSound");
    const wrongSound = document.getElementById("wrongSound");

    const volumeSlider = document.getElementById("volumeSlider");
    const volumeValue = document.getElementById("volumeValue");

    let activeBoard = 1;
    let boardUsedCells = { 1: [], 2: [] };
    let boardCategories = {
      1: ["Dragons", "LCK", "Lore", "Riot Pls", "Order Must Be"],
      2: ["Champion Details", "Pick & Ban", "Who Am I", "Abilities", "Ingame Quest"]
    };

    const STORAGE_KEY = "quizQuestionBank_editor_v3";

    function createDefaultQuestionBank() {
      return {
        1: Array.from({ length: 25 }, (_, i) => ({
          question: `Question ${i + 1}`,
          answer: `Answer ${i + 1}`,
          image: ""
        })),
        2: Array.from({ length: 25 }, (_, i) => ({
          question: `Question ${i + 26}`,
          answer: `Answer ${i + 26}`,
          image: ""
        }))
      };
    }

    function loadQuestionBank() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return createDefaultQuestionBank();
      try {
        const parsed = JSON.parse(raw);
        if (!parsed["1"] || !parsed["2"]) return createDefaultQuestionBank();
        return parsed;
      } catch {
        return createDefaultQuestionBank();
      }
    }

    function saveQuestionBank() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(questionBank));
    }

    let questionBank = loadQuestionBank();
    let selectedQuestion = null;
    let selectedIndex = null;

    function applyVolume(volume) {
      const v = Math.max(0, Math.min(1, volume));
      buzzerSound.volume = v;
      correctSound.volume = v;
      wrongSound.volume = v;
    }

    const savedVolume = localStorage.getItem("hostVolume");
    const startVolume = savedVolume !== null ? Number(savedVolume) : 0.6;
    volumeSlider.value = Math.round(startVolume * 100);
    volumeValue.textContent = `${Math.round(startVolume * 100)}%`;
    applyVolume(startVolume);

    volumeSlider.addEventListener("input", () => {
      const newVolume = Number(volumeSlider.value) / 100;
      volumeValue.textContent = `${volumeSlider.value}%`;
      localStorage.setItem("hostVolume", String(newVolume));
      applyVolume(newVolume);
    });

    function playSound(el) {
      if (!el) return;
      el.pause();
      el.currentTime = 0;
      el.play().catch(() => {});
    }

   function renderCategoriesForBoard() {
  const cats = boardCategories[activeBoard];
  document.querySelectorAll(".category").forEach((node, i) => {
    node.textContent = cats[i] || "Category";
  });

  catInputs.forEach((input, i) => {
    input.value = cats[i] || "";
  });

  refreshEditorCategoryOptions();
}

    function saveCategoriesFromInputs() {
      boardCategories[activeBoard] = catInputs.map(input => input.value.trim() || "Category");
      renderCategoriesForBoard();
      socket.emit("updateCategories", {
        board: activeBoard,
        categories: boardCategories[activeBoard]
      });
      statusLine.textContent = `Categories saved for Board ${activeBoard}`;
      if (selectedIndex !== null) {
        loadSelectedIntoEditor();
      }
    }
    
function refreshEditorCategoryOptions() {
  editorCategory.innerHTML = "";

  (boardCategories[activeBoard] || []).forEach((cat) => {
    const option = document.createElement("option");
    option.value = cat;
    option.textContent = cat;
    editorCategory.appendChild(option);
  });
}
    function renderScores(scores, players) {
      const slotMap = { 1: null, 2: null, 3: null, 4: null, 5: null };
      (players || []).forEach((p) => {
        slotMap[p.slot] = p.name;
      });

      scoreGrid.innerHTML = "";
      for (let slot = 1; slot <= 5; slot++) {
        const playerName = slotMap[slot] || `Slot ${slot}`;
        const points = typeof scores[playerName] !== "undefined" ? scores[playerName] : 0;

        const card = document.createElement("div");
        card.className = "score-card";
        card.innerHTML = `
          <div class="score-name">${playerName}</div>
          <div class="score-points">${points}</div>
        `;
        scoreGrid.appendChild(card);
      }
    }

    function renderPlayerSelect(players) {
      const currentValue = playerSelect.value;
      playerSelect.innerHTML = "";
      players.forEach((player) => {
        const option = document.createElement("option");
        option.value = player.name;
        option.textContent = `${player.name} (Slot ${player.slot})`;
        playerSelect.appendChild(option);
      });
      if (currentValue && [...playerSelect.options].some((o) => o.value === currentValue)) {
        playerSelect.value = currentValue;
      }
    }

    function renderPrivatePreview(question) {
      if (!question) {
        privateCategory.textContent = "";
        privateValue.textContent = "";
        privateCenter.innerHTML = "";
        privateCenter.textContent = "";
        privateAnswer.style.display = "none";
        privateAnswer.textContent = "";
        return;
      }

      privateCategory.textContent = question.category || "";
      privateValue.textContent = question.value || "";

      if (question.image) {
        privateCenter.innerHTML = `<img class="preview-image" src="${question.image}" alt="">`;
      } else {
        privateCenter.textContent = question.question || "";
      }

      privateAnswer.style.display = "block";
      privateAnswer.textContent = question.answer || "";
    }

    function renderPublicPreview(stateQuestion, state) {
      if (!stateQuestion) {
        publicCategory.textContent = "";
        publicValue.textContent = "";
        publicCenter.innerHTML = "";
        publicCenter.textContent = "";
        publicAnswer.style.display = "none";
        publicAnswer.textContent = "";
        return;
      }

      publicCategory.textContent = stateQuestion.category || "";
      publicValue.textContent = stateQuestion.value || "";

      if (state && state.questionVisible) {
        if (stateQuestion.image) {
          publicCenter.innerHTML = `<img class="preview-image" src="${stateQuestion.image}" alt="">`;
        } else {
          publicCenter.textContent = stateQuestion.question || "";
        }
      } else {
        publicCenter.innerHTML = "";
        publicCenter.textContent = "";
      }

      if (state && state.answerVisible) {
        publicAnswer.style.display = "block";
        publicAnswer.textContent = stateQuestion.answer || "";
      } else {
        publicAnswer.style.display = "none";
        publicAnswer.textContent = "";
      }
    }

    function updateBoardButtons() {
      document.getElementById("board1Btn").classList.toggle("active-board", activeBoard === 1);
      document.getElementById("board2Btn").classList.toggle("active-board", activeBoard === 2);
    }

    function highlightSelectedCell() {
      const cells = board.querySelectorAll(".cell");
      cells.forEach((cell, i) => {
        cell.classList.toggle("selected", i === selectedIndex);
      });
    }

    function buildBoard() {
      board.innerHTML = "";

      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 5; col++) {
          const index = row * 5 + col;
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.textContent = values[row];

          if ((boardUsedCells[activeBoard] || []).includes(index)) {
            cell.classList.add("used");
          }

          if (selectedIndex === index) {
            cell.classList.add("selected");
          }

          cell.addEventListener("click", () => {
            selectedIndex = index;
            loadSelectedIntoEditor();
            highlightSelectedCell();
          });

          board.appendChild(cell);
        }
      }
    }

    function loadSelectedIntoEditor() {
      if (selectedIndex === null) {
        selectedCellInfo.textContent = "Select a cell first, then edit the question.";
        editorCategory.value = "";
        editorValue.value = "";
        editorQuestion.value = "";
        editorAnswer.value = "";
        editorImage.value = "";
        renderPrivatePreview(null);
        return;
      }

      const row = Math.floor(selectedIndex / 5);
      const col = selectedIndex % 5;
      const item = questionBank[activeBoard][selectedIndex];

      selectedQuestion = {
        board: activeBoard,
        index: selectedIndex,
        category: boardCategories[activeBoard][col],
        value: values[row],
        question: item.question || "",
        answer: item.answer || "",
        image: item.image || ""
      };

      selectedCellInfo.textContent = `Editing Board ${activeBoard} | ${boardCategories[activeBoard][col]} | ${values[row]}`;
      editorCategory.value = selectedQuestion.category;
      editorValue.value = selectedQuestion.value;
      editorQuestion.value = selectedQuestion.question;
      editorAnswer.value = selectedQuestion.answer;
      editorImage.value = selectedQuestion.image;

      renderPrivatePreview(selectedQuestion);
    }

    function saveSelectedQuestion() {
      if (selectedIndex === null) {
        statusLine.textContent = "Please select a cell first";
        return;
      }

      questionBank[activeBoard][selectedIndex] = {
        question: editorQuestion.value.trim(),
        answer: editorAnswer.value.trim(),
        image: editorImage.value.trim()
      };

      saveQuestionBank();
      loadSelectedIntoEditor();
      statusLine.textContent = `Question saved for Board ${activeBoard}`;
    }

    function switchBoard(boardNumber) {
      activeBoard = boardNumber;
      selectedIndex = null;
      selectedQuestion = null;
      renderCategoriesForBoard();
      updateBoardButtons();
      buildBoard();
      loadSelectedIntoEditor();
      renderPublicPreview(null, null);
      socket.emit("setCurrentBoard", boardNumber);
      statusLine.textContent = `Board ${boardNumber} selected`;
    }

    function togglePanel(panel) {
      if (panel === "categories") {
        categoryEditor.classList.toggle("hidden");
        questionEditor.classList.add("hidden");
      } else {
        questionEditor.classList.toggle("hidden");
        categoryEditor.classList.add("hidden");
      }
    }

    document.getElementById("toggleCategoryEditorBtn").onclick = () => togglePanel("categories");
    document.getElementById("toggleQuestionEditorBtn").onclick = () => togglePanel("question");

    document.getElementById("saveCategoriesBtn").onclick = saveCategoriesFromInputs;

    document.getElementById("saveQuestionBtn").onclick = saveSelectedQuestion;

    document.getElementById("clearImageBtn").onclick = () => {
      editorImage.value = "";
    };

    document.getElementById("loadSelectedBtn").onclick = () => {
      loadSelectedIntoEditor();
    };

    socket.on("lobbyUpdate", (players) => {
      renderPlayerSelect(players);
    });

    socket.on("syncState", (state) => {
      boardUsedCells = state.usedCellsBoards || { 1: [], 2: [] };
      activeBoard = state.currentBoard || 1;

      if (state.categoriesBoards) {
        boardCategories = {
          1: state.categoriesBoards[1] || boardCategories[1],
          2: state.categoriesBoards[2] || boardCategories[2]
        };
      }

      renderCategoriesForBoard();
      updateBoardButtons();
      buildBoard();
      highlightSelectedCell();

      renderScores(state.scores || {}, state.lobbyPlayers || []);
      renderPlayerSelect(state.lobbyPlayers || []);

      boardInfo.textContent =
        `Active: Board ${activeBoard} | Board 1 open: ${25 - (boardUsedCells[1] || []).length} | Board 2 open: ${25 - (boardUsedCells[2] || []).length}`;

      renderPublicPreview(state.currentQuestion, state);
    });

    socket.on("playerBuzzed", () => {
      playSound(buzzerSound);
    });

    socket.on("answerResult", ({ result, name, points }) => {
      if (result === "correct") {
        playSound(correctSound);
        statusLine.textContent = `${name} gets +${points} points automatically`;
      } else {
        playSound(wrongSound);
        statusLine.textContent = `${name} gets -${points} points automatically`;
      }
    });

    socket.on("manualScoreChanged", ({ type, name, points }) => {
      if (type === "add") {
        statusLine.textContent = `${name} got +${points} points manually`;
      } else {
        statusLine.textContent = `${name} lost -${points} points manually`;
      }
    });

    document.getElementById("board1Btn").onclick = () => switchBoard(1);
    document.getElementById("board2Btn").onclick = () => switchBoard(2);

    document.getElementById("showQuestionBtn").onclick = () => {
      if (selectedIndex === null) {
        statusLine.textContent = "Please select a cell first";
        return;
      }

      const row = Math.floor(selectedIndex / 5);
      const col = selectedIndex % 5;
      const item = questionBank[activeBoard][selectedIndex];

      selectedQuestion = {
        board: activeBoard,
        index: selectedIndex,
        category: boardCategories[activeBoard][col],
        value: values[row],
        question: item.question || "",
        answer: item.answer || "",
        image: item.image || ""
      };

      renderPrivatePreview(selectedQuestion);
      socket.emit("openQuestion", selectedQuestion);
      socket.emit("showQuestion");
      statusLine.textContent = "Question shown publicly";
    };

    document.getElementById("showAnswerBtn").onclick = () => {
      socket.emit("showAnswer");
      statusLine.textContent = "Answer shown publicly";
    };

    document.getElementById("hideAnswerBtn").onclick = () => {
      socket.emit("hideAnswer");
      statusLine.textContent = "Answer hidden";
    };

    document.getElementById("correctBtn").onclick = () => socket.emit("markCorrect");
    document.getElementById("wrongBtn").onclick = () => socket.emit("markWrong");
    document.getElementById("resetBuzzerBtn").onclick = () => socket.emit("resetBuzzer");
    document.getElementById("undoBtn").onclick = () => socket.emit("undoLastAction");
    document.getElementById("timer20Btn").onclick = () => socket.emit("timerStart", 20);
    document.getElementById("timerStopBtn").onclick = () => socket.emit("timerStop");
    document.getElementById("timerResetBtn").onclick = () => socket.emit("timerReset");

    document.getElementById("closeQuestionBtn").onclick = () => {
      socket.emit("closeQuestion");
      statusLine.textContent = "Question closed";
    };

    document.getElementById("resetBoardBtn").onclick = () => {
      socket.emit("resetCurrentBoard");
      statusLine.textContent = `Board ${activeBoard} reset`;
    };

    document.getElementById("newGameBtn").onclick = () => {
      if (!confirm("Do you really want to start a new game?")) return;
      socket.emit("newGameReset");
      statusLine.textContent = "New game started";
    };

    document.getElementById("manualAddBtn").onclick = () => {
      const name = playerSelect.value;
      const points = Number(manualPointsInput.value) || 0;
      if (!name || points <= 0) return;
      socket.emit("manualAddPoints", { name, points });
    };

    document.getElementById("manualSubtractBtn").onclick = () => {
      const name = playerSelect.value;
      const points = Number(manualPointsInput.value) || 0;
      if (!name || points <= 0) return;
      socket.emit("manualSubtractPoints", { name, points });
    };

    renderCategoriesForBoard();
    updateBoardButtons();
    buildBoard();
    loadSelectedIntoEditor();
  </script>
</body>
</html>
