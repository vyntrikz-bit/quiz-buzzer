<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Host</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px;
      background: #121a2d;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    .primary { background: #2563eb; }
    .danger { background: #dc2626; }
    .success { background: #16a34a; }
    .warn { background: #e67e22; }
    .purple { background: #9333ea; }

    .wrap {
      padding: 14px;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .category {
      background: #162038;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      outline: none;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .cell {
      height: 94px;
      background: #f2a7c2;
      color: #18181b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
    }

    .cell.used {
      opacity: 0.28;
      cursor: default;
    }

    .score-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .score-card {
      background: #162038;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .score-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .score-points {
      font-size: 28px;
      font-weight: 800;
      color: #ffd54a;
    }

    .panel {
      margin-top: 18px;
      background: #111827;
      border-radius: 14px;
      padding: 18px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"] {
      width: 420px;
      max-width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: white;
      font-size: 16px;
    }

    .muted {
      color: #cbd5e1;
      font-size: 14px;
    }

    .big-preview {
      margin-top: 14px;
      background: #e8a4bc;
      color: #111;
      border-radius: 20px;
      min-height: 300px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .preview-category {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 28px;
      font-weight: 800;
    }

    .preview-value {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 28px;
      font-weight: 800;
    }

    .preview-center {
      height: 100%;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 60px;
      box-sizing: border-box;
      font-size: 40px;
      font-weight: 800;
      line-height: 1.2;
    }

    .preview-image {
      max-width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
    }

    .preview-answer {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: white;
      color: #111;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 28px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="primary" id="showQuestionBtn">Frage anzeigen</button>
    <button class="success" id="showAnswerBtn">Antwort anzeigen</button>
    <button id="hideAnswerBtn">Antwort ausblenden</button>
    <button class="success" id="correctBtn">Richtig</button>
    <button class="danger" id="wrongBtn">Falsch</button>
    <button class="warn" id="resetBuzzerBtn">Buzzer Reset</button>
    <button class="purple" id="undoBtn">Undo</button>
    <button id="timer20Btn">Timer 20s</button>
    <button id="timerStopBtn">Timer Stop</button>
    <button id="timerResetBtn">Timer Reset</button>
    <button id="closeQuestionBtn">Frage schließen</button>
  </div>

  <div class="wrap">
    <div class="categories" id="categories">
      <div class="category" contenteditable="true">Thema 1</div>
      <div class="category" contenteditable="true">Thema 2</div>
      <div class="category" contenteditable="true">Thema 3</div>
      <div class="category" contenteditable="true">Thema 4</div>
      <div class="category" contenteditable="true">Thema 5</div>
    </div>

    <div class="board" id="board"></div>

    <div class="score-grid" id="scoreGrid"></div>

    <div class="panel">
      <div class="row">
        <strong>Aktuelle Vorschau</strong>
        <span class="muted">Hier siehst du, wie das große Overlay-Feld aussehen wird.</span>
      </div>

      <div class="big-preview" id="preview">
        <div class="preview-category" id="previewCategory"></div>
        <div class="preview-value" id="previewValue"></div>
        <div class="preview-center" id="previewCenter"></div>
        <div class="preview-answer" id="previewAnswer" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    const socket = io();

    const values = [200, 300, 400, 500, 600];
    const board = document.getElementById("board");
    const categoriesEl = document.getElementById("categories");
    const scoreGrid = document.getElementById("scoreGrid");

    const previewCategory = document.getElementById("previewCategory");
    const previewValue = document.getElementById("previewValue");
    const previewCenter = document.getElementById("previewCenter");
    const previewAnswer = document.getElementById("previewAnswer");

    // 25 Felder, row-major: 5 Kategorien x 5 Punkte
    // image: Dateiname im public-Ordner oder leer
    const questionBank = [
      { question: "Frage 1", answer: "Antwort 1", image: "" },
      { question: "Frage 2", answer: "Antwort 2", image: "" },
      { question: "Frage 3", answer: "Antwort 3", image: "" },
      { question: "Frage 4", answer: "Antwort 4", image: "" },
      { question: "Frage 5", answer: "Antwort 5", image: "" },

      { question: "Frage 6", answer: "Antwort 6", image: "" },
      { question: "Frage 7", answer: "Antwort 7", image: "" },
      { question: "Frage 8", answer: "Antwort 8", image: "" },
      { question: "Frage 9", answer: "Antwort 9", image: "" },
      { question: "Frage 10", answer: "Antwort 10", image: "" },

      { question: "Frage 11", answer: "Antwort 11", image: "" },
      { question: "Frage 12", answer: "Antwort 12", image: "" },
      { question: "Frage 13", answer: "Antwort 13", image: "" },
      { question: "Frage 14", answer: "Antwort 14", image: "" },
      { question: "Frage 15", answer: "Antwort 15", image: "" },

      { question: "Frage 16", answer: "Antwort 16", image: "" },
      { question: "Frage 17", answer: "Antwort 17", image: "" },
      { question: "Frage 18", answer: "Antwort 18", image: "" },
      { question: "Frage 19", answer: "Antwort 19", image: "" },
      { question: "Frage 20", answer: "Antwort 20", image: "" },

      { question: "Frage 21", answer: "Antwort 21", image: "" },
      { question: "Frage 22", answer: "Antwort 22", image: "" },
      { question: "Frage 23", answer: "Antwort 23", image: "" },
      { question: "Frage 24", answer: "Antwort 24", image: "" },
      { question: "Frage 25", answer: "Antwort 25", image: "" }
    ];

    function getCategories() {
      return [...document.querySelectorAll(".category")].map((el) => el.textContent.trim() || "Thema");
    }

    function sendCategories() {
      socket.emit("updateCategories", getCategories());
    }

    [...document.querySelectorAll(".category")].forEach((el) => {
      el.addEventListener("blur", sendCategories);
    });

    const cells = [];
    let selectedIndex = null;

    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 5; col++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = values[row];

        const index = row * 5 + col;

        cell.addEventListener("click", () => {
          if (cell.classList.contains("used")) return;

          selectedIndex = index;

          const categories = getCategories();
          const item = questionBank[index];

          socket.emit("openQuestion", {
            index,
            category: categories[col],
            value: values[row],
            question: item.question,
            answer: item.answer,
            image: item.image
          });
        });

        board.appendChild(cell);
        cells.push(cell);
      }
    }

    function renderScores(scores, players) {
      const slotMap = { 1: null, 2: null, 3: null, 4: null, 5: null };
      (players || []).forEach((p) => {
        slotMap[p.slot] = p.name;
      });

      scoreGrid.innerHTML = "";
      for (let slot = 1; slot <= 5; slot++) {
        const playerName = slotMap[slot] || `Slot ${slot}`;
        const points = typeof scores[playerName] !== "undefined" ? scores[playerName] : 0;

        const card = document.createElement("div");
        card.className = "score-card";
        card.innerHTML = `
          <div class="score-name">${playerName}</div>
          <div class="score-points">${points}</div>
        `;
        scoreGrid.appendChild(card);
      }
    }

    socket.on("syncState", (state) => {
      if (state.categories && state.categories.length === 5) {
        const nodes = document.querySelectorAll(".category");
        state.categories.forEach((cat, i) => {
          if (nodes[i] && document.activeElement !== nodes[i]) {
            nodes[i].textContent = cat;
          }
        });
      }

      cells.forEach((cell, i) => {
        cell.classList.toggle("used", (state.usedCells || []).includes(i));
      });

      renderScores(state.scores || {}, state.lobbyPlayers || []);

      if (state.currentQuestion && state.questionPanelOpen) {
        previewCategory.textContent = state.currentQuestion.category || "";
        previewValue.textContent = state.currentQuestion.value || "";

        if (state.questionVisible) {
          if (state.currentQuestion.image) {
            previewCenter.innerHTML = `<img class="preview-image" src="${state.currentQuestion.image}" alt="">`;
          } else {
            previewCenter.textContent = state.currentQuestion.question || "";
          }
        } else {
          previewCenter.textContent = "";
        }

        if (state.answerVisible) {
          previewAnswer.style.display = "block";
          previewAnswer.textContent = state.currentQuestion.answer || "";
        } else {
          previewAnswer.style.display = "none";
          previewAnswer.textContent = "";
        }
      } else {
        previewCategory.textContent = "";
        previewValue.textContent = "";
        previewCenter.textContent = "";
        previewAnswer.style.display = "none";
        previewAnswer.textContent = "";
      }
    });

    document.getElementById("showQuestionBtn").onclick = () => socket.emit("showQuestion");
    document.getElementById("showAnswerBtn").onclick = () => socket.emit("showAnswer");
    document.getElementById("hideAnswerBtn").onclick = () => socket.emit("hideAnswer");
    document.getElementById("correctBtn").onclick = () => socket.emit("markCorrect");
    document.getElementById("wrongBtn").onclick = () => socket.emit("markWrong");
    document.getElementById("resetBuzzerBtn").onclick = () => socket.emit("resetBuzzer");
    document.getElementById("undoBtn").onclick = () => socket.emit("undoLastAction");
    document.getElementById("timer20Btn").onclick = () => socket.emit("timerStart", 20);
    document.getElementById("timerStopBtn").onclick = () => socket.emit("timerStop");
    document.getElementById("timerResetBtn").onclick = () => socket.emit("timerReset");
    document.getElementById("closeQuestionBtn").onclick = () => socket.emit("closeQuestion");
  </script>
</body>
</html>
