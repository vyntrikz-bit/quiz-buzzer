<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Host</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
    }

   .board-wrap {
  display: block;
}

.board-wrap.hidden {
  display: none !important;
}

    .categories {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 10px;
    }

    .category {
      background: #1e2a5a;
      padding: 16px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      outline: none;
      border: 2px solid transparent;
    }

    .category:focus {
      border-color: #ffd54a;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 10px;
    }

    .cell {
      background: #2b3c8f;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }

    .cell:hover {
      background: #3a4fc0;
    }

    .cell.used {
      background: #111;
      color: #555;
      cursor: default;
    }

    .scores {
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .score-card {
      background: #162038;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .score-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .score-points {
      font-size: 28px;
      color: #ffd54a;
    }

    .top-info {
      display: flex;
      gap: 10px;
      padding: 0 10px 10px;
      flex-wrap: wrap;
    }

    .info-box {
      background: #162038;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: bold;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 40px;
      z-index: 999;
    }

    .overlay.show {
      display: flex;
    }

    .question-text {
      font-size: 44px;
      max-width: 1100px;
      margin-bottom: 24px;
      line-height: 1.25;
    }

    .buzzed-text {
      font-size: 30px;
      color: #ffd54a;
      margin-bottom: 16px;
      min-height: 80px;
    }

    .subtext {
      font-size: 20px;
      color: #cbd5e1;
      margin-bottom: 16px;
      min-height: 30px;
    }

    .timer-text {
      font-size: 38px;
      font-weight: bold;
      color: #60a5fa;
      margin-bottom: 20px;
      min-height: 48px;
    }

    .overlay-scores {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .overlay-score-card {
      background: #162038;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .host-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      max-width: 700px;
      justify-content: flex-end;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .unlock-btn { background: #16a34a; color: white; }
    .correct-btn { background: #2563eb; color: white; }
    .wrong-btn { background: #dc2626; color: white; }
    .reset-btn { background: #e67e22; color: white; }
    .undo-btn { background: #9333ea; color: white; }
    .close-btn { background: #475569; color: white; }
    .timer-btn { background: #0ea5e9; color: white; }
  </style>
</head>
<body>
  <div id="mainScreen">
  <div class="board-wrap" id="boardWrap">
      <div class="categories" id="categories">
        <div class="category" contenteditable="true">Thema 1</div>
        <div class="category" contenteditable="true">Thema 2</div>
        <div class="category" contenteditable="true">Thema 3</div>
        <div class="category" contenteditable="true">Thema 4</div>
        <div class="category" contenteditable="true">Thema 5</div>
      </div>

      <div class="board" id="board"></div>

      <div class="top-info">
        <div class="info-box" id="remainingInfo">Offene Felder: 25</div>
        <div class="info-box" id="multiplierInfo">Multiplikator: x1</div>
      </div>

      <div class="scores" id="scores"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="host-controls">
      <button class="unlock-btn" id="unlockSoundBtn">Ton freischalten</button>
      <button class="timer-btn" id="timer20Btn">Timer 20s</button>
      <button class="timer-btn" id="timerStopBtn">Timer Stop</button>
      <button class="timer-btn" id="timerResetBtn">Timer Reset</button>
      <button class="correct-btn" id="correctBtn">Richtig</button>
      <button class="wrong-btn" id="wrongBtn">Falsch</button>
      <button class="reset-btn" id="resetBtn">Buzzer zurücksetzen</button>
      <button class="undo-btn" id="undoBtn">Undo</button>
      <button class="close-btn" id="closeBtn">Frage schließen</button>
    </div>

    <div class="question-text" id="questionText"></div>
    <div class="timer-text" id="timerText"></div>
    <div class="buzzed-text" id="buzzedText">Noch niemand hat gebuzzert</div>
    <div class="subtext" id="subText"></div>
    <div class="overlay-scores" id="overlayScores"></div>
  </div>

  <script>
    const socket = io();

    const values = [100, 200, 300, 400, 500];
    const board = document.getElementById("board");
    const overlay = document.getElementById("overlay");
    const mainScreen = document.getElementById("mainScreen");
    const boardWrap = document.getElementById("boardWrap");
    const questionText = document.getElementById("questionText");
    const buzzedText = document.getElementById("buzzedText");
    const subText = document.getElementById("subText");
    const timerText = document.getElementById("timerText");
    const scoresEl = document.getElementById("scores");
    const overlayScores = document.getElementById("overlayScores");
    const remainingInfo = document.getElementById("remainingInfo");
    const multiplierInfo = document.getElementById("multiplierInfo");

    const questions = [
  { q: "Frage 1", a: "Antwort 1" },
  { q: "Frage 2", a: "Antwort 2" },
  { q: "Frage 3", a: "Antwort 3" },
  { q: "Frage 4", a: "Antwort 4" },
  { q: "Frage 5", a: "Antwort 5" },

  { q: "Frage 6", a: "Antwort 6" },
  { q: "Frage 7", a: "Antwort 7" },
  { q: "Frage 8", a: "Antwort 8" },
  { q: "Frage 9", a: "Antwort 9" },
  { q: "Frage 10", a: "Antwort 10" },

  { q: "Frage 11", a: "Antwort 11" },
  { q: "Frage 12", a: "Antwort 12" },
  { q: "Frage 13", a: "Antwort 13" },
  { q: "Frage 14", a: "Antwort 14" },
  { q: "Frage 15", a: "Antwort 15" },

  { q: "Frage 16", a: "Antwort 16" },
  { q: "Frage 17", a: "Antwort 17" },
  { q: "Frage 18", a: "Antwort 18" },
  { q: "Frage 19", a: "Antwort 19" },
  { q: "Frage 20", a: "Antwort 20" },

  { q: "Frage 21", a: "Antwort 21" },
  { q: "Frage 22", a: "Antwort 22" },
  { q: "Frage 23", a: "Antwort 23" },
  { q: "Frage 24", a: "Antwort 24" },
  { q: "Frage 25", a: "Antwort 25" }
];

    let audioUnlocked = false;
    let audioContext = null;
    let cells = [];

    function unlockAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      gain.gain.value = 0.001;
      osc.frequency.value = 440;
      osc.start();
      osc.stop(audioContext.currentTime + 0.05);

      audioUnlocked = true;
      document.getElementById("unlockSoundBtn").textContent = "Ton aktiv";
    }

    function playBuzzSound() {
      if (!audioUnlocked || !audioContext) return;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(880, audioContext.currentTime);
      gain.gain.setValueAtTime(0.15, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.25);
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.start();
      osc.stop(audioContext.currentTime + 0.25);
    }

    function playCorrectSound() {
      if (!audioUnlocked || !audioContext) return;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(700, audioContext.currentTime);
      osc.frequency.linearRampToValueAtTime(1000, audioContext.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.35);
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.start();
      osc.stop(audioContext.currentTime + 0.35);
    }

    function playWrongSound() {
      if (!audioUnlocked || !audioContext) return;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(300, audioContext.currentTime);
      osc.frequency.linearRampToValueAtTime(160, audioContext.currentTime + 0.35);
      gain.gain.setValueAtTime(0.15, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.35);
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.start();
      osc.stop(audioContext.currentTime + 0.35);
    }

    function scoreCardsHtml(scores) {
      const entries = Object.entries(scores || {});
      if (entries.length === 0) return "";

      return entries
        .sort((a, b) => b[1] - a[1])
        .map(([name, points]) => `
          <div class="overlay-score-card">
            <div class="score-name">${name}</div>
            <div class="score-points">${points}</div>
          </div>
        `)
        .join("");
    }

    function renderScores(scores) {
      const html = scoreCardsHtml(scores);
      scoresEl.innerHTML = html;
      overlayScores.innerHTML = html;
    }

    function sendCategories() {
      const cats = [...document.querySelectorAll(".category")].map(el => el.textContent.trim() || "Thema");
      socket.emit("updateCategories", cats);
    }

    [...document.querySelectorAll(".category")].forEach(el => {
      el.addEventListener("blur", sendCategories);
    });

    let index = 0;
    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 5; col++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = values[row];

        const currentIndex = index;
        const currentValue = values[row];

        cell.addEventListener("click", () => {
          if (cell.classList.contains("used")) return;

          socket.emit("openQuestion", {
            questionText: questions[currentIndex],
            value: currentValue,
            index: currentIndex
          });
        });

        board.appendChild(cell);
        cells.push(cell);
        index++;
      }
    }

    socket.on("syncState", (state) => {
      if (state.categories && state.categories.length === 5) {
        const categoryNodes = document.querySelectorAll(".category");
        state.categories.forEach((cat, i) => {
          if (categoryNodes[i] && document.activeElement !== categoryNodes[i]) {
            categoryNodes[i].textContent = cat;
          }
        });
      }

      cells.forEach((cell, i) => {
        cell.classList.toggle("used", (state.usedCells || []).includes(i));
      });

      renderScores(state.scores || {});
      remainingInfo.textContent = "Offene Felder: " + (state.remainingCells ?? 25);
      multiplierInfo.textContent = "Multiplikator: x" + (state.currentMultiplier ?? 1);

      if (state.activeQuestion) {
  questionText.textContent = state.activeQuestion;
  questionOverlay.classList.add("show");
  boardWrap.classList.add("hidden");
} else {
  questionText.textContent = "Warte auf die nächste Frage";
  questionOverlay.classList.remove("show");
  boardWrap.classList.remove("hidden");
  timerText.textContent = "";
  status.textContent = "";
  substatus.textContent = "";
}

      if (state.firstBuzz) {
        buzzedText.innerHTML = `
          <span style="font-size:50px; color:#ffd54a;">🔔 ${state.firstBuzz}</span>
          <br>
          <span style="font-size:22px; color:white;">hat gebuzzert!</span>
        `;
      } else if (state.activeQuestion) {
        buzzedText.textContent = "Noch niemand hat gebuzzert";
      }

      if (state.eliminatedPlayers && state.eliminatedPlayers.length > 0) {
        subText.textContent = "Schon raus für diese Frage: " + state.eliminatedPlayers.join(", ");
      } else {
        subText.textContent = "";
      }

      if (state.timer && state.timer.total > 0) {
        timerText.textContent = "Timer: " + state.timer.remaining + "s";
      } else {
        timerText.textContent = "";
      }
    });

    socket.on("playerBuzzed", () => {
      playBuzzSound();
    });

    socket.on("answerResult", ({ result, name, points }) => {
      if (result === "correct") {
        playCorrectSound();
        subText.textContent = name + " bekommt +" + points + " Punkte";
      } else {
        playWrongSound();
        subText.textContent = name + " bekommt -" + points + " Punkte";
      }
    });

    document.getElementById("unlockSoundBtn").addEventListener("click", unlockAudio);
    document.getElementById("timer20Btn").addEventListener("click", () => socket.emit("timerStart", 20));
    document.getElementById("timerStopBtn").addEventListener("click", () => socket.emit("timerStop"));
    document.getElementById("timerResetBtn").addEventListener("click", () => socket.emit("timerReset"));
    document.getElementById("correctBtn").addEventListener("click", () => socket.emit("markCorrect"));
    document.getElementById("wrongBtn").addEventListener("click", () => socket.emit("markWrong"));
    document.getElementById("resetBtn").addEventListener("click", () => socket.emit("resetBuzzer"));
    document.getElementById("undoBtn").addEventListener("click", () => socket.emit("undoLastAction"));
    document.getElementById("closeBtn").addEventListener("click", () => socket.emit("closeQuestion"));
  </script>
</body>
</html>
