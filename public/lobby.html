<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Lobby</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
      text-align: center;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 260px;
      font-size: 18px;
      margin-right: 8px;
    }

    button {
      padding: 12px 18px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-size: 16px;
    }

    .players {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }

    .card {
      background: #162038;
      border-radius: 14px;
      padding: 20px 10px;
    }

    .slot {
      font-size: 15px;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    .name {
      font-size: 24px;
      font-weight: 800;
    }

    .status {
      margin-top: 20px;
      font-size: 22px;
      color: #ffd54a;
      min-height: 32px;
    }
  </style>
</head>
<body>
  <h1>Quiz Lobby</h1>

  <div>
    <input id="nameInput" placeholder="Dein Name">
    <button id="joinBtn">Beitreten</button>
  </div>

  <div class="status" id="status"></div>

  <div class="players" id="players"></div>

  <script>
    const socket = io();
    const playersEl = document.getElementById("players");
    const statusEl = document.getElementById("status");
    const nameInput = document.getElementById("nameInput");

    nameInput.value = localStorage.getItem("playerName") || "";

    document.getElementById("joinBtn").onclick = () => {
      const name = nameInput.value.trim().slice(0, 24);
      if (!name) return;
      localStorage.setItem("playerName", name);
      socket.emit("joinLobby", name);
      statusEl.textContent = "Beitritt gesendet";
    };

    socket.on("lobbyUpdate", (players) => {
      playersEl.innerHTML = "";
      for (let slot = 1; slot <= 5; slot++) {
        const player = players.find((p) => p.slot === slot);
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <div class="slot">Slot ${slot}</div>
          <div class="name">${player ? player.name : "Leer"}</div>
        `;
        playersEl.appendChild(div);
      }
    });

    socket.on("lobbyFull", () => {
      statusEl.textContent = "Die Lobby ist voll";
    });
  </script>
</body>
</html>
