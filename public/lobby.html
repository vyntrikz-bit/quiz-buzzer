<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Lobby</title>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
      box-sizing: border-box;
      text-align: center;
    }

    h1 {
      margin-top: 10px;
      margin-bottom: 10px;
      font-size: 42px;
    }

    .sub {
      color: #cbd5e1;
      margin-bottom: 30px;
      font-size: 18px;
    }

    .join-box {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    input {
      padding: 14px;
      border-radius: 10px;
      border: none;
      width: 280px;
      font-size: 18px;
      background: #162038;
      color: white;
    }

    button {
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .status {
      min-height: 30px;
      font-size: 20px;
      color: #ffd54a;
      margin-bottom: 20px;
    }

    .players {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-top: 20px;
    }

    .card {
      background: #162038;
      border-radius: 14px;
      padding: 18px 10px;
      box-sizing: border-box;
    }

    .slot {
      font-size: 15px;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .name {
      font-size: 24px;
      font-weight: 800;
      word-break: break-word;
    }

    .footer-note {
      margin-top: 28px;
      color: #94a3b8;
      font-size: 15px;
    }

    @media (max-width: 1100px) {
      .players {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .players {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>Quiz Lobby</h1>
  <div class="sub">Gib deinen Namen ein und trete dem Spiel bei.</div>

  <div class="join-box">
    <input id="nameInput" placeholder="Dein Name">
    <button id="joinBtn">Beitreten</button>
  </div>

  <div class="status" id="status"></div>

  <div class="players" id="players"></div>

  <div class="footer-note">
    Nach dem Beitritt wirst du automatisch zur Spieleransicht weitergeleitet.
  </div>

  <script>
    const socket = io();

    const playersEl = document.getElementById("players");
    const statusEl = document.getElementById("status");
    const nameInput = document.getElementById("nameInput");
    const joinBtn = document.getElementById("joinBtn");

    let joined = false;

    nameInput.value = localStorage.getItem("playerName") || "";

    function renderPlayers(players) {
      playersEl.innerHTML = "";

      for (let slot = 1; slot <= 5; slot++) {
        const player = players.find((p) => p.slot === slot);

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <div class="slot">Slot ${slot}</div>
          <div class="name">${player ? player.name : "Leer"}</div>
        `;
        playersEl.appendChild(div);
      }
    }

    function joinLobby() {
      const name = nameInput.value.trim().slice(0, 24);
      if (!name) {
        statusEl.textContent = "Bitte gib zuerst einen Namen ein.";
        return;
      }

      localStorage.setItem("playerName", name);
      socket.emit("joinLobby", name);
      statusEl.textContent = "Beitritt wird verarbeitet...";
      joined = true;
    }

    joinBtn.addEventListener("click", joinLobby);

    nameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        joinLobby();
      }
    });

    socket.on("lobbyUpdate", (players) => {
      renderPlayers(players);

      const savedName = (localStorage.getItem("playerName") || "").trim().toLowerCase();
      const existsInLobby = players.some(
        (p) => p.name.trim().toLowerCase() === savedName
      );

      if (joined && existsInLobby) {
        statusEl.textContent = "Erfolgreich beigetreten – Weiterleitung...";
        setTimeout(() => {
          window.location.href = "/player.html";
        }, 400);
      }
    });

    socket.on("lobbyFull", () => {
      joined = false;
      statusEl.textContent = "Die Lobby ist voll.";
    });
  </script>
</body>
</html>
