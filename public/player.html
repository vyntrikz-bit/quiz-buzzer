<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spieler-Buzzer</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .board-wrap {
      display: block;
    }

    .board-wrap.hidden {
      display: none !important;
    }

    .topbar {
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input {
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      width: 220px;
    }

    button {
      padding: 12px 16px;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      font-weight: bold;
    }

    .info-row {
      display: flex;
      gap: 10px;
      padding: 0 12px 12px;
      flex-wrap: wrap;
    }

    .info-box {
      background: #162038;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: bold;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 10px;
    }

    .category {
      background: #1e2a5a;
      padding: 16px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 10px;
    }

    .cell {
      background: #2b3c8f;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 26px;
      font-weight: bold;
      user-select: none;
    }

    .cell.used {
      background: #111;
      color: #555;
    }

    .question-overlay {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      z-index: 999;
    }

    .question-overlay.show {
      display: flex;
    }

    .question-text {
      font-size: 42px;
      line-height: 1.25;
      max-width: 1100px;
      margin-bottom: 18px;
    }

    .timer-text {
      font-size: 34px;
      color: #60a5fa;
      font-weight: bold;
      min-height: 40px;
      margin-bottom: 16px;
    }

    .status {
      font-size: 28px;
      min-height: 40px;
      color: #ffd54a;
      margin-bottom: 10px;
    }

    .substatus {
      font-size: 18px;
      color: #cbd5e1;
      min-height: 24px;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .overlay-scoreboard {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .overlay-score-card {
      background: #162038;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .score-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .score-points {
      font-size: 28px;
      color: #ffd54a;
    }

    .hint {
      text-align: center;
      color: #cbd5e1;
      padding: 0 12px 16px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="mainScreen">
    <div class="board-wrap" id="boardWrap">
      <div class="topbar">
        <input type="text" id="playerName" placeholder="Dein Name">
        <button id="saveName">Name speichern</button>
      </div>

      <div class="info-row">
        <div class="info-box" id="remainingInfo">Offene Felder: 25</div>
        <div class="info-box" id="multiplierInfo">Multiplikator: x1</div>
      </div>

      <div class="categories" id="categories">
        <div class="category">Thema 1</div>
        <div class="category">Thema 2</div>
        <div class="category">Thema 3</div>
        <div class="category">Thema 4</div>
        <div class="category">Thema 5</div>
      </div>

      <div class="board" id="board"></div>

      <div class="hint">
        Drücke die <strong>Leertaste</strong>, wenn eine Frage offen ist.
      </div>
    </div>
  </div>

  <div class="question-overlay" id="questionOverlay">
    <div class="question-text" id="questionText">Warte auf die nächste Frage</div>
    <div class="timer-text" id="timerText"></div>
    <div class="status" id="status"></div>
    <div class="substatus" id="substatus"></div>
    <div class="overlay-scoreboard" id="overlayScoreboard"></div>
  </div>

  <script>
    const socket = io();

    const values = [100, 200, 300, 400, 500];
    const playerNameInput = document.getElementById("playerName");
    const saveNameBtn = document.getElementById("saveName");
    const remainingInfo = document.getElementById("remainingInfo");
    const multiplierInfo = document.getElementById("multiplierInfo");
    const questionText = document.getElementById("questionText");
    const timerText = document.getElementById("timerText");
    const status = document.getElementById("status");
    const substatus = document.getElementById("substatus");
    const board = document.getElementById("board");
    const boardWrap = document.getElementById("boardWrap");
    const questionOverlay = document.getElementById("questionOverlay");
    const overlayScoreboard = document.getElementById("overlayScoreboard");

    let playerName = localStorage.getItem("playerName") || "";
    playerNameInput.value = playerName;

    const cells = [];

    function renderOverlayScores(scores) {
      const entries = Object.entries(scores || {});
      if (entries.length === 0) {
        overlayScoreboard.innerHTML = "";
        return;
      }

      overlayScoreboard.innerHTML = entries
        .sort((a, b) => b[1] - a[1])
        .map(([name, points]) => `
          <div class="overlay-score-card">
            <div class="score-name">${name}</div>
            <div class="score-points">${points}</div>
          </div>
        `)
        .join("");
    }

    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 5; col++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = values[row];
        board.appendChild(cell);
        cells.push(cell);
      }
    }

    saveNameBtn.onclick = () => {
      playerName = playerNameInput.value.trim().slice(0, 20);
      localStorage.setItem("playerName", playerName);
      status.textContent = playerName ? "Name gespeichert" : "Bitte Namen eingeben";
    };

    socket.on("syncState", (state) => {
      if (state.categories && state.categories.length === 5) {
        const categoryNodes = document.querySelectorAll(".category");
        state.categories.forEach((cat, i) => {
          if (categoryNodes[i]) {
            categoryNodes[i].textContent = cat;
          }
        });
      }

      cells.forEach((cell, i) => {
        cell.classList.toggle("used", (state.usedCells || []).includes(i));
      });

      remainingInfo.textContent = "Offene Felder: " + (state.remainingCells ?? 25);
      multiplierInfo.textContent = "Multiplikator: x" + (state.currentMultiplier ?? 1);

      renderOverlayScores(state.scores || {});

      if (state.activeQuestion) {
        questionText.textContent = state.activeQuestion;
        questionOverlay.classList.add("show");
        boardWrap.classList.add("hidden");
      } else {
        questionText.textContent = "Warte auf die nächste Frage";
        questionOverlay.classList.remove("show");
        boardWrap.classList.remove("hidden");
        timerText.textContent = "";
        status.textContent = "";
        substatus.textContent = "";
      }

      if (state.timer && state.timer.total > 0) {
        timerText.textContent = "Timer: " + state.timer.remaining + "s";
      } else {
        timerText.textContent = "";
      }

      if (!state.activeQuestion) return;

      if (!playerName) {
        status.textContent = "Bitte zuerst Namen speichern";
        substatus.textContent = "";
        return;
      }

      if (state.answerVisible && state.currentAnswer) {
        substatus.innerHTML = `
          Richtige Antwort:
          <br>
          <strong style="font-size:28px;color:#22c55e;">
            ${state.currentAnswer}
          </strong>
        `;
      } else if (state.eliminatedPlayers && state.eliminatedPlayers.includes(playerName)) {
        status.textContent = "Du bist für diese Frage raus";
        substatus.textContent = "Warte auf die nächste Frage";
        return;
      }

      if (state.firstBuzz) {
        if (state.firstBuzz === playerName) {
          status.textContent = "Du bist dran!";
          if (!state.answerVisible) {
            substatus.textContent = "Warte auf die Wertung des Quizmasters";
          }
        } else {
          status.textContent = state.firstBuzz + " ist dran";
          if (!state.answerVisible) {
            substatus.textContent = "Warte auf die Entscheidung oder auf eine neue Chance";
          }
        }
      } else {
        status.textContent = "Frage offen – Leertaste drücken!";
        if (!state.answerVisible) {
          substatus.textContent = "";
        }
      }
    });

    socket.on("answerResult", ({ result, name, points }) => {
      if (!playerName) return;

      if (name === playerName) {
        if (result === "correct") {
          status.textContent = "Richtig! +" + points + " Punkte";
        } else {
          status.textContent = "Falsch! -" + points + " Punkte";
        }
      } else {
        if (result === "correct") {
          if (!substatus.innerHTML.includes("Richtige Antwort:")) {
            substatus.textContent = name + " war richtig (+" + points + ")";
          }
        } else {
          if (!substatus.innerHTML.includes("Richtige Antwort:")) {
            substatus.textContent = name + " war falsch (-" + points + ")";
          }
        }
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.code !== "Space") return;
      event.preventDefault();

      if (!playerName) {
        status.textContent = "Bitte zuerst Namen speichern";
        return;
      }

      socket.emit("buzz", playerName);
    });
  </script>
</body>
</html>
