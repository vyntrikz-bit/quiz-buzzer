<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spieler-Buzzer</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .box {
      text-align: center;
      max-width: 700px;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      width: 260px;
      margin-bottom: 16px;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      margin-left: 8px;
    }

    #status {
      margin-top: 20px;
      font-size: 24px;
    }

    .hint {
      margin-top: 16px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Spieler-Buzzer</h1>

    <div>
      <input type="text" id="playerName" placeholder="Dein Name">
      <button id="saveName">Name speichern</button>
    </div>

    <div id="status">Warte auf die nächste Frage</div>

    <div class="hint">
      Drücke die <strong>Leertaste</strong>, wenn eine Frage offen ist.
    </div>
  </div>

  <script>
    const socket = io();

    const playerNameInput = document.getElementById("playerName");
    const saveNameBtn = document.getElementById("saveName");
    const status = document.getElementById("status");

    let playerName = localStorage.getItem("playerName") || "";
    playerNameInput.value = playerName;

    saveNameBtn.onclick = () => {
      playerName = playerNameInput.value.trim();
      localStorage.setItem("playerName", playerName);
      status.innerText = "Name gespeichert";
    };

    socket.on("syncState", (state) => {
      if (!state.activeQuestion) {
        status.innerText = "Warte auf die nächste Frage";
        return;
      }

      if (state.firstBuzz) {
        if (state.firstBuzz === playerName) {
          status.innerText = "Du warst zuerst!";
        } else {
          status.innerText = state.firstBuzz + " war zuerst";
        }
      } else {
        status.innerText = "Frage offen – Leertaste drücken!";
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.code !== "Space") return;

      event.preventDefault();

      if (!playerName) {
        status.innerText = "Bitte zuerst Namen speichern";
        return;
      }

      socket.emit("buzz", playerName);
    });
  </script>
</body>
</html>
