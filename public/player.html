<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Player</title>
</head>
<body style="background:#0b0f1a; color:white; font-family:Arial; display:flex; align-items:center; justify-content:center; height:100vh; margin:0;">
  <div style="text-align:center; max-width:700px; padding:20px;">
    <h1>Spieler-Buzzer</h1>
    <p>Drücke die <strong>Leertaste</strong>, wenn eine Frage offen ist.</p>
    <p id="status">Bereit</p>
  </div>

  <script>
    const statusText = document.getElementById("status");

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        statusText.innerText = "Gebuzzert!";
      }
    });
  </script>
</body>
</html>
