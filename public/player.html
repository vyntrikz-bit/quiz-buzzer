<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spieler</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .top {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 240px;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    .question-panel {
      margin-top: 20px;
      background: #e8a4bc;
      color: #111;
      border-radius: 20px;
      min-height: 280px;
      position: relative;
      padding: 20px;
      box-sizing: border-box;
    }

    .category {
      position: absolute;
      top: 14px;
      left: 18px;
      font-size: 28px;
      font-weight: 800;
    }

    .value {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 28px;
      font-weight: 800;
    }

    .center {
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 44px 60px;
      box-sizing: border-box;
      font-size: 38px;
      font-weight: 800;
      line-height: 1.2;
    }

    .image {
      max-width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
    }

    .answer {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: white;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 28px;
      font-weight: 800;
      display: none;
    }

    .status {
      margin-top: 18px;
      font-size: 26px;
      color: #ffd54a;
      min-height: 32px;
    }

    .hint {
      margin-top: 10px;
      color: #cbd5e1;
    }

    .players {
      margin-top: 26px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .player-card {
      background: #162038;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .player-card.active {
      border: 4px solid #ef4444;
      box-shadow: 0 0 20px #ef4444;
    }

    .player-name {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .player-score {
      font-size: 26px;
      font-weight: 800;
      color: #ffd54a;
    }
  </style>
</head>
<body>
  <div class="top">
    <input id="nameInput" placeholder="Dein Name">
    <button id="saveBtn">Name speichern</button>
  </div>

  <div class="question-panel">
    <div class="category" id="category"></div>
    <div class="value" id="value"></div>
    <div class="center" id="center">Warte auf die nächste Frage</div>
    <div class="answer" id="answer"></div>
  </div>

  <div class="status" id="status"></div>
  <div class="hint">Mit Leertaste buzzern, sobald die Frage sichtbar ist.</div>

  <div class="players" id="players"></div>

  <script>
    const socket = io();

    const nameInput = document.getElementById("nameInput");
    const categoryEl = document.getElementById("category");
    const valueEl = document.getElementById("value");
    const centerEl = document.getElementById("center");
    const answerEl = document.getElementById("answer");
    const statusEl = document.getElementById("status");
    const playersEl = document.getElementById("players");

    let playerName = localStorage.getItem("playerName") || "";
    nameInput.value = playerName;
    let lobbyPlayers = [];

    document.getElementById("saveBtn").onclick = () => {
      playerName = nameInput.value.trim().slice(0, 24);
      if (!playerName) return;
      localStorage.setItem("playerName", playerName);
      socket.emit("joinLobby", playerName);
      statusEl.textContent = "Name gespeichert";
    };

    function renderPlayers(scores, currentBuzz) {
      playersEl.innerHTML = "";

      for (let slot = 1; slot <= 5; slot++) {
        const player = lobbyPlayers.find((p) => p.slot === slot);
        const name = player ? player.name : "Leer";
        const points = typeof scores[name] !== "undefined" ? scores[name] : 0;

        const div = document.createElement("div");
        div.className = "player-card" + (name === currentBuzz ? " active" : "");
        div.innerHTML = `
          <div class="player-name">${name}</div>
          <div class="player-score">${points}</div>
        `;
        playersEl.appendChild(div);
      }
    }

    socket.on("lobbyUpdate", (players) => {
      lobbyPlayers = players;
    });

    socket.on("syncState", (state) => {
      renderPlayers(state.scores || {}, state.firstBuzz || "");

      if (!state.currentQuestion || !state.questionPanelOpen) {
        categoryEl.textContent = "";
        valueEl.textContent = "";
        centerEl.textContent = "Warte auf die nächste Frage";
        answerEl.style.display = "none";
        answerEl.textContent = "";
        statusEl.textContent = "";
        return;
      }

      categoryEl.textContent = state.currentQuestion.category || "";
      valueEl.textContent = state.currentQuestion.value || "";

      if (state.questionVisible) {
        if (state.currentQuestion.image) {
          centerEl.innerHTML = `<img class="image" src="${state.currentQuestion.image}" alt="">`;
        } else {
          centerEl.textContent = state.currentQuestion.question || "";
        }
      } else {
        centerEl.textContent = "";
      }

      if (state.answerVisible) {
        answerEl.style.display = "block";
        answerEl.textContent = state.currentQuestion.answer || "";
      } else {
        answerEl.style.display = "none";
        answerEl.textContent = "";
      }

      if (!playerName) {
        statusEl.textContent = "Bitte zuerst Namen speichern";
        return;
      }

      if (state.eliminatedPlayers && state.eliminatedPlayers.includes(playerName)) {
        statusEl.textContent = "Du bist für diese Frage raus";
        return;
      }

      if (state.firstBuzz) {
        if (state.firstBuzz === playerName) {
          statusEl.textContent = "Du bist dran!";
        } else {
          statusEl.textContent = state.firstBuzz + " ist dran";
        }
      } else if (state.questionVisible) {
        statusEl.textContent = "Frage sichtbar – Leertaste drücken!";
      } else {
        statusEl.textContent = "Warte auf Freigabe der Frage";
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.code !== "Space") return;
      event.preventDefault();

      if (!playerName) {
        statusEl.textContent = "Bitte zuerst Namen speichern";
        return;
      }

      socket.emit("buzz", playerName);
    });
  </script>
</body>
</html>
